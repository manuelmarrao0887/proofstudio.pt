<!DOCTYPE html>
<html lang="pt-PT">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>PROOF. QUORUM. — Calçada do Tojal 48</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Geist:wght@300;400;500;600;700&family=Geist+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
  :root {
    /* ───── Eclipse tokens (light) ───── */
    --bg: #fbfcfe;
    --surface: #f3f6fb;
    --elevated: #eaeff7;
    --border: #dde4ee;
    --border-strong: #c4cee0;
    --fg: #0b1220;
    --fg-muted: #4a5366;
    --fg-subtle: #8b95a8;
    --accent: #0b1220;

    /* State (feedback only) */
    --success: #22c55e;
    --warning: #f59e0b;
    --danger: #ef4444;
    --info: #94a3c4;

    /* ───── Legacy var remap → Eclipse (DO NOT rename; JS emits these inline) ───── */
    --ink: var(--bg);
    --ink-2: var(--surface);
    --ink-3: var(--elevated);
    --paper: var(--fg);
    --paper-2: var(--fg-muted);
    --grey: var(--border);
    --grey-2: var(--fg-muted);
    --grey-3: var(--fg-subtle);
    --signal: var(--fg);
    --signal-2: var(--accent);

    /* Fonts */
    --font-display: 'Geist', sans-serif;
    --font-body: 'Geist', sans-serif;
    --font-mono: 'Geist Mono', monospace;
    --font-accent: 'Geist', sans-serif;
    --ease-out: cubic-bezier(0.2, 0, 0, 1);
    --ease-enter: cubic-bezier(0.16, 1, 0.3, 1);
  }

  :root[data-theme="dark"] {
    --bg: #06080c;
    --surface: #0b0f17;
    --elevated: #11161f;
    --border: #1c2230;
    --border-strong: #262e3e;
    --fg: #f5f7fb;
    --fg-muted: #8b95a8;
    --fg-subtle: #4a5366;
    --accent: #c8d4ea;

    --success: #22c55e;
    --warning: #f59e0b;
    --danger: #ef4444;
    --info: #94a3c4;
  }

  * { box-sizing: border-box; margin: 0; padding: 0; }
  html { color-scheme: light; background: var(--bg); }
  body {
    background: var(--bg);
    color: var(--fg);
    font-family: var(--font-body);
    font-weight: 400;
    line-height: 1.6;
    -webkit-font-smoothing: antialiased;
    min-height: 100vh;
    overflow-x: hidden;
  }

  ::selection { background: var(--fg); color: var(--bg); }

  a, button { color: inherit; font-family: inherit; }
  button { cursor: pointer; background: transparent; border: none; }

  /* ───── HEADER ───────────────────────────── */
  .header {
    position: sticky;
    top: 0;
    z-index: 50;
    background: var(--bg);
    border-bottom: 1px solid var(--border);
    padding: 20px 40px;
    display: flex;
    align-items: center;
    justify-content: space-between;
    gap: 24px;
  }
  .wordmark {
    font-family: var(--font-display);
    font-weight: 600;
    font-size: 17px;
    letter-spacing: -0.01em;
    line-height: 1;
    display: flex;
    align-items: baseline;
    gap: 10px;
    color: var(--fg);
  }
  .wordmark .dot { color: var(--fg-subtle); }
  .wordmark .sub {
    font-weight: 600;
    color: var(--fg);
  }
  .wordmark .bar {
    width: 1px;
    height: 14px;
    background: var(--border-strong);
    align-self: center;
  }
  .header-meta {
    display: flex;
    align-items: center;
    gap: 24px;
    margin-left: auto;
  }
  .caption {
    font-family: var(--font-mono);
    font-size: 10px;
    letter-spacing: 0.1em;
    text-transform: uppercase;
    color: var(--fg-subtle);
    font-weight: 400;
  }
  .role-select {
    display: flex;
    align-items: center;
    border: 1px solid var(--border);
    border-radius: 999px;
    overflow: hidden;
    background: var(--surface);
    padding: 3px;
    gap: 2px;
  }
  .role-select button {
    font-family: var(--font-mono);
    font-size: 10px;
    letter-spacing: 0.1em;
    text-transform: uppercase;
    padding: 8px 14px;
    color: var(--fg-muted);
    border-radius: 999px;
    transition: all 140ms var(--ease-out);
  }
  .role-select button.active {
    background: var(--fg);
    color: var(--bg);
    font-weight: 500;
  }
  .role-select button:not(.active):hover {
    background: var(--elevated);
    color: var(--fg);
  }

  /* ───── LAYOUT ───────────────────────────── */
  .layout {
    display: grid;
    grid-template-columns: 248px 1fr;
    min-height: calc(100vh - 62px - 74px);
  }
  .sidebar {
    border-right: 1px solid var(--border);
    padding: 36px 0;
    background: var(--bg);
    position: sticky;
    top: 62px;
    align-self: start;
    height: calc(100vh - 62px);
    overflow-y: auto;
  }
  .sidebar-section {
    padding: 0 28px 8px;
    margin-bottom: 14px;
  }
  .sidebar-section-label {
    font-family: var(--font-mono);
    font-size: 9px;
    letter-spacing: 0.1em;
    text-transform: uppercase;
    color: var(--fg-subtle);
    margin-bottom: 12px;
  }
  .nav-item {
    width: 100%;
    text-align: left;
    padding: 10px 28px;
    font-family: var(--font-display);
    font-size: 13px;
    font-weight: 400;
    color: var(--fg-muted);
    border-left: 2px solid transparent;
    transition: all 140ms var(--ease-out);
    display: flex;
    align-items: center;
    justify-content: space-between;
    letter-spacing: -0.005em;
  }
  .nav-item:hover {
    background: var(--surface);
    color: var(--fg);
  }
  .nav-item.active {
    background: var(--surface);
    border-left-color: var(--fg);
    color: var(--fg);
    font-weight: 500;
  }
  .nav-item .count {
    font-family: var(--font-mono);
    font-size: 10px;
    color: var(--fg-subtle);
    font-weight: 400;
  }
  .nav-item.active .count { color: var(--fg-muted); }

  /* ───── MAIN ─────────────────────────────── */
  main {
    padding: 56px 64px 96px;
    max-width: 1240px;
  }
  .page-header {
    margin-bottom: 48px;
    padding-bottom: 24px;
    border-bottom: 1px solid var(--border);
    display: flex;
    align-items: flex-end;
    justify-content: space-between;
    gap: 24px;
    flex-wrap: wrap;
  }
  .page-title {
    font-family: var(--font-display);
    font-weight: 500;
    font-size: clamp(28px, 4vw, 42px);
    letter-spacing: -0.025em;
    line-height: 1.05;
    color: var(--fg);
  }
  .page-subtitle {
    color: var(--fg-muted);
    font-size: 14px;
    margin-top: 12px;
    letter-spacing: -0.005em;
    max-width: 620px;
  }
  .page-tag {
    font-family: var(--font-mono);
    font-size: 10px;
    letter-spacing: 0.1em;
    text-transform: uppercase;
    color: var(--fg-muted);
    padding: 7px 12px;
    border: 1px solid var(--border);
    border-radius: 999px;
  }

  /* ───── GRID & CARDS ─────────────────────── */
  .grid-2 { display: grid; grid-template-columns: 1fr 1fr; gap: 18px; }
  .grid-3 { display: grid; grid-template-columns: repeat(3, 1fr); gap: 18px; }
  .grid-4 { display: grid; grid-template-columns: repeat(4, 1fr); gap: 18px; }
  @media (max-width: 1024px) {
    .grid-3, .grid-4 { grid-template-columns: repeat(2, 1fr); }
  }

  .card {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 12px;
    padding: 26px 28px;
  }
  .card-signal {
    border-left: 2px solid var(--fg);
  }
  .card-label {
    font-family: var(--font-mono);
    font-size: 10px;
    letter-spacing: 0.1em;
    text-transform: uppercase;
    color: var(--fg-muted);
    margin-bottom: 16px;
    display: flex;
    align-items: center;
    justify-content: space-between;
    gap: 8px;
  }
  .stat-value {
    font-family: var(--font-display);
    font-weight: 500;
    font-size: 36px;
    letter-spacing: -0.025em;
    line-height: 1;
    color: var(--fg);
  }
  .stat-value .unit {
    font-size: 16px;
    font-weight: 400;
    color: var(--fg-subtle);
    margin-left: 4px;
    letter-spacing: 0;
  }
  .stat-delta {
    font-family: var(--font-mono);
    font-size: 11px;
    color: var(--fg-subtle);
    margin-top: 12px;
    letter-spacing: 0.02em;
  }
  .stat-delta.up { color: var(--success); }
  .stat-delta.down { color: var(--danger); }

  /* ───── STATUS DOT ───────────────────────── */
  .status {
    font-family: var(--font-mono);
    font-size: 10px;
    letter-spacing: 0.1em;
    text-transform: uppercase;
    display: inline-flex;
    align-items: center;
    gap: 6px;
    color: var(--fg-muted);
  }
  .status::before {
    content: '';
    width: 6px;
    height: 6px;
    border-radius: 50%;
    background: currentColor;
  }
  .status.ready { color: var(--warning); }
  .status.approved { color: var(--success); }
  .status.draft { color: var(--fg-subtle); }
  .status.archived { color: var(--fg-subtle); }

  /* ───── TABLES ───────────────────────────── */
  .table {
    width: 100%;
    border: 1px solid var(--border);
    background: var(--surface);
    border-collapse: separate;
    border-spacing: 0;
    border-radius: 12px;
    overflow: hidden;
  }
  .table th, .table td {
    padding: 15px 22px;
    text-align: left;
    border-bottom: 1px solid var(--border);
    font-size: 13px;
  }
  .table th {
    font-family: var(--font-mono);
    font-size: 10px;
    font-weight: 500;
    letter-spacing: 0.1em;
    text-transform: uppercase;
    color: var(--fg-muted);
    background: var(--elevated);
    padding: 13px 22px;
  }
  .table td { font-weight: 400; color: var(--fg); }
  .table td .mono { font-family: var(--font-mono); font-weight: 400; }
  .table tr:last-child td { border-bottom: none; }
  .table tr:hover td { background: var(--elevated); }
  .table .amount { text-align: right; font-family: var(--font-mono); font-weight: 400; }
  .table .amount.neg { color: var(--danger); }
  .table .amount.pos { color: var(--success); }

  /* ───── BUTTONS ──────────────────────────── */
  .btn {
    font-family: var(--font-display);
    font-size: 12px;
    font-weight: 500;
    letter-spacing: 0.02em;
    padding: 11px 22px;
    border: 1px solid var(--fg);
    background: var(--fg);
    color: var(--bg);
    border-radius: 999px;
    transition: all 140ms var(--ease-out);
  }
  .btn:hover { opacity: 0.85; }
  .btn:focus-visible { outline: 2px solid var(--fg); outline-offset: 2px; }
  .btn-secondary {
    background: transparent;
    border-color: var(--border);
    color: var(--fg);
  }
  .btn-secondary:hover { border-color: var(--border-strong); background: var(--surface); opacity: 1; }
  .btn-signal {
    background: var(--fg);
    color: var(--bg);
    border-color: var(--fg);
    font-weight: 500;
  }
  .btn-signal:hover { opacity: 0.85; }

  /* ───── SECTION SEP ──────────────────────── */
  .section {
    margin-top: 64px;
  }
  .section-header {
    display: flex;
    align-items: baseline;
    justify-content: space-between;
    margin-bottom: 24px;
    padding-bottom: 14px;
    border-bottom: 1px solid var(--border);
  }
  .section-title {
    font-family: var(--font-display);
    font-weight: 500;
    font-size: 18px;
    letter-spacing: -0.015em;
    color: var(--fg);
  }

  /* ───── BUILDING DIAGRAM ─────────────────── */
  .building {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 12px;
    padding: 32px;
  }
  .floor {
    display: grid;
    grid-template-columns: 80px 1fr 1fr;
    border-bottom: 1px solid var(--border);
    min-height: 72px;
    align-items: stretch;
  }
  .floor:last-child { border-bottom: none; }
  .floor-label {
    font-family: var(--font-mono);
    font-size: 11px;
    letter-spacing: 0.1em;
    text-transform: uppercase;
    color: var(--fg-muted);
    padding: 18px 16px;
    border-right: 1px solid var(--border);
    display: flex;
    align-items: center;
  }
  .unit {
    padding: 16px 18px;
    border-right: 1px solid var(--border);
    cursor: pointer;
    transition: background 140ms var(--ease-out);
    display: flex;
    flex-direction: column;
    justify-content: center;
  }
  .unit:last-child { border-right: none; }
  .unit:hover { background: var(--elevated); }
  .unit.self { background: var(--elevated); border-left: 2px solid var(--fg); padding-left: 16px; }
  .unit.common { background: repeating-linear-gradient(45deg, var(--surface), var(--surface) 8px, var(--elevated) 8px, var(--elevated) 16px); }
  .unit-id {
    font-family: var(--font-mono);
    font-size: 10px;
    letter-spacing: 0.1em;
    text-transform: uppercase;
    color: var(--fg-subtle);
  }
  .unit-owner {
    font-family: var(--font-display);
    font-size: 13px;
    font-weight: 500;
    color: var(--fg);
    margin-top: 5px;
  }
  .unit-status {
    font-family: var(--font-mono);
    font-size: 9px;
    color: var(--fg-subtle);
    letter-spacing: 0.1em;
    margin-top: 5px;
    text-transform: uppercase;
  }
  .unit.debt .unit-status { color: var(--danger); }

  /* ───── LIST ITEMS ───────────────────────── */
  .item-list { border: 1px solid var(--border); background: var(--surface); border-radius: 12px; overflow: hidden; }
  .item-row {
    display: grid;
    grid-template-columns: 120px 1fr auto;
    gap: 24px;
    padding: 20px 26px;
    border-bottom: 1px solid var(--border);
    align-items: center;
  }
  .item-row:last-child { border-bottom: none; }
  .item-date {
    font-family: var(--font-mono);
    font-size: 11px;
    color: var(--fg-subtle);
    letter-spacing: 0.02em;
  }
  .item-title {
    font-family: var(--font-display);
    font-weight: 500;
    font-size: 14px;
    color: var(--fg);
  }
  .item-meta {
    font-size: 12px;
    color: var(--fg-muted);
    margin-top: 5px;
  }

  /* ───── PROGRESS BAR ─────────────────────── */
  .progress {
    height: 6px;
    background: var(--elevated);
    border-radius: 999px;
    position: relative;
    margin-top: 14px;
    overflow: hidden;
  }
  .progress-fill {
    height: 100%;
    background: var(--fg);
    border-radius: 999px;
    transition: width 400ms var(--ease-out);
  }
  .progress-fill.signal { background: var(--fg); }
  .progress-fill.success { background: var(--success); }

  /* ───── CHAT / MURAL ─────────────────────── */
  .mural-post {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 12px;
    padding: 22px 26px;
    margin-bottom: 14px;
  }
  .mural-post.pinned { border-left: 2px solid var(--fg); }
  .post-header {
    display: flex;
    align-items: center;
    gap: 12px;
    margin-bottom: 12px;
  }
  .post-author {
    font-family: var(--font-display);
    font-weight: 500;
    font-size: 12px;
    letter-spacing: 0.01em;
    color: var(--fg);
  }
  .post-date {
    font-family: var(--font-mono);
    font-size: 10px;
    color: var(--fg-subtle);
    letter-spacing: 0.05em;
  }
  .post-tag {
    font-family: var(--font-mono);
    font-size: 9px;
    letter-spacing: 0.1em;
    text-transform: uppercase;
    padding: 4px 9px;
    border: 1px solid var(--border);
    border-radius: 999px;
    color: var(--fg-muted);
  }
  .post-tag.urgent { border-color: var(--warning); color: var(--warning); }
  .post-body {
    font-size: 14px;
    line-height: 1.65;
    color: var(--fg-muted);
  }
  .post-body em {
    font-family: var(--font-accent);
    font-style: italic;
    font-weight: 400;
    color: var(--fg);
  }

  /* ───── FORM ─────────────────────────────── */
  .form-group { margin-bottom: 20px; }
  .form-label {
    display: block;
    font-family: var(--font-mono);
    font-size: 10px;
    letter-spacing: 0.1em;
    text-transform: uppercase;
    color: var(--fg-muted);
    margin-bottom: 9px;
  }
  .input, .textarea, .select {
    width: 100%;
    background: var(--elevated);
    border: 1px solid var(--border);
    color: var(--fg);
    padding: 12px 16px;
    border-radius: 6px;
    font: 400 14px var(--font-body);
    transition: border-color 140ms var(--ease-out);
  }
  .input:focus, .textarea:focus, .select:focus {
    border-color: var(--border-strong);
    outline: none;
  }
  .input::placeholder, .textarea::placeholder { color: var(--fg-subtle); }
  .textarea { min-height: 120px; resize: vertical; font-family: var(--font-body); }

  /* ───── FINANCIAL BAR ────────────────────── */
  .fin-bar {
    display: grid;
    grid-template-columns: 140px 1fr 120px;
    gap: 16px;
    align-items: center;
    padding: 13px 0;
    border-bottom: 1px solid var(--border);
  }
  .fin-bar:last-child { border-bottom: none; }
  .fin-bar-label {
    font-size: 13px;
    font-weight: 400;
    color: var(--fg-muted);
  }
  .fin-bar-track {
    height: 6px;
    background: var(--elevated);
    border-radius: 999px;
    position: relative;
    overflow: hidden;
  }
  .fin-bar-track .fill {
    height: 100%;
    background: var(--fg);
    border-radius: 999px;
  }
  .fin-bar-amount {
    font-family: var(--font-mono);
    font-size: 13px;
    text-align: right;
    color: var(--fg);
  }

  /* ───── FOOTER ───────────────────────────── */
  footer {
    border-top: 1px solid var(--border);
    padding: 28px 40px;
    display: flex;
    align-items: center;
    justify-content: space-between;
    gap: 16px;
    flex-wrap: wrap;
  }
  .footer-wordmark {
    font-family: var(--font-display);
    font-weight: 600;
    font-size: 13px;
    letter-spacing: -0.01em;
    color: var(--fg);
  }
  .footer-wordmark .dot { color: var(--fg-subtle); }
  .footer-meta {
    font-family: var(--font-mono);
    font-size: 10px;
    letter-spacing: 0.1em;
    color: var(--fg-subtle);
  }

  /* ───── QUOTE / PULL ─────────────────────── */
  .pull {
    font-family: var(--font-accent);
    font-style: italic;
    font-weight: 400;
    font-size: 20px;
    line-height: 1.45;
    color: var(--fg);
    padding: 26px 0 26px 30px;
    border-left: 1px solid var(--border-strong);
    margin: 40px 0;
    max-width: 680px;
  }

  /* ───── UTILS ────────────────────────────── */
  .hidden { display: none !important; }
  .mono { font-family: var(--font-mono); }
  .muted { color: var(--fg-muted); }
  .big-num {
    font-family: var(--font-display);
    font-weight: 500;
    font-size: 46px;
    letter-spacing: -0.03em;
    line-height: 1;
    color: var(--fg);
  }
  .mt-2 { margin-top: 8px; } .mt-4 { margin-top: 16px; } .mt-6 { margin-top: 24px; } .mt-8 { margin-top: 32px; }
  .mb-2 { margin-bottom: 8px; } .mb-4 { margin-bottom: 16px; } .mb-6 { margin-bottom: 24px; }
  .flex { display: flex; } .items-center { align-items: center; } .justify-between { justify-content: space-between; }
  .gap-4 { gap: 16px; } .gap-6 { gap: 24px; } .gap-8 { gap: 32px; }

  @media (max-width: 900px) {
    .layout { grid-template-columns: 1fr; }
    .sidebar { position: static; height: auto; border-right: none; border-bottom: 1px solid var(--border); padding: 20px 0; }
    main { padding: 36px 24px 64px; }
    .header { padding: 16px 20px; flex-wrap: wrap; }
    .role-select button { padding: 7px 11px; font-size: 9px; }
  }
</style>
</head>
<body>

<!-- ─────────────────────────────────────────── HEADER ─────────────── -->
<header class="header">
  <div class="wordmark">
    <span>PROOF<span class="dot">.</span></span>
    <span class="bar"></span>
    <span class="sub">QUORUM<span class="dot">.</span></span>
  </div>
  <div class="header-meta">
    <span class="caption">CASE 048 · Calçada do Tojal</span>
    <div class="role-select" role="tablist" aria-label="Perfil de acesso">
      <button data-role="admin" class="active">Administração</button>
      <button data-role="condomino">Condómino</button>
      <button data-role="inquilino">Inquilino</button>
    </div>
    <span class="caption">v0.1.0</span>
  </div>
</header>

<!-- ─────────────────────────────────────────── LAYOUT ─────────────── -->
<div class="layout">

  <!-- SIDEBAR -->
  <aside class="sidebar">
    <div id="sidebar-nav"></div>
  </aside>

  <!-- MAIN CONTENT -->
  <main id="content"></main>
</div>

<!-- ─────────────────────────────────────────── FOOTER ─────────────── -->

  return `

      <div class="unit-owner">${f.nome}</div>
      <div class="unit-status">${f.nome === 'FRAÇÃO COMUM' ? `COMUM · inq. ${f.inquilino}` : f.estado === 'divida' ? `DÍVIDA ${fmt(f.divida)}` : `QUOTA ${fmt(f.quota)}${f.admin ? ' · ADMIN' : ''}`}</div>

// ─── Helper: render mural post ───────────────────────────────────────
function mural(a) {
  return `
    <article class="mural-post ${a.pinned ? 'pinned' : ''}">
      <header class="post-header">
        <span class="post-author">${a.autor}</span>
        <span class="post-date">${a.data.replace(/-/g,'.')}</span>
        <span class="post-tag ${a.urgent ? 'urgent' : ''}">${a.tag}</span>
      </header>
      <h3 style="font-family:var(--font-display);font-weight:700;font-size:17px;margin-bottom:10px;letter-spacing:-0.01em;">${a.titulo}</h3>
      <div class="post-body">${a.body}</div>
    </article>
  `;
}
