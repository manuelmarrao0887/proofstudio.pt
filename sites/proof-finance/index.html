:root{
  /* ── Eclipse tokens (Proof Studio brand system) ── */
  --bg:#fbfcfe;
  --surface:#f3f6fb;
  --elevated:#eaeff7;
  --border:#dde4ee;
  --border-strong:#c4cee0;
  --fg:#0b1220;
  --fg-muted:#4a5366;
  --fg-subtle:#8b95a8;
  --accent:#0b1220;
  --bg-glass:rgba(251,252,254,0.78);
  /* System feedback colors (only for status, not decoration) */
  --success:#22c55e;
  --warning:#f59e0b;
  --danger:#ef4444;
  --info:#94a3c4;
  /* Aliases for legacy code (do not introduce new uses) */
  --bg2:var(--surface);
  --bg3:var(--elevated);
  --text:var(--fg);
  --text2:var(--fg-muted);
  --text3:var(--fg-subtle);
  --border2:var(--border-strong);
  --signal:var(--danger);
  --signal-soft:rgba(239,68,68,0.10);
  --success-soft:rgba(34,197,94,0.10);
  --blue:var(--fg);                 /* "blue" accents map to brand fg */
  --blue-soft:rgba(11,18,32,0.06);
  --purple:var(--fg-muted);
  --orange:var(--warning);
  --teal:var(--info);
  --pink:var(--fg-muted);
  --grad-hero:var(--fg);            /* gradients replaced by flat fg */
  --grad-success:var(--success);
  --grad-warn:var(--warning);
  /* Typography */
  --font:'Geist','Inter',-apple-system,'Helvetica Neue',sans-serif;
  --mono:'Geist Mono','SF Mono','Menlo',monospace;
  /* Radii */
  --r:16px;--r2:12px;--r3:8px;
  /* Shadows — Eclipse defaults to NO shadow; use 1px border */
  --shadow:0 0 0 1px var(--border);
  --shadow-lg:0 4px 12px rgba(11,18,32,0.06),0 0 0 1px rgba(11,18,32,0.04);
  --shadow-hero:0 0 0 1px var(--border);
  /* Safe areas + ease */
  --nav-h:64px;
  --safe-bottom:env(safe-area-inset-bottom,0);
  --safe-top:env(safe-area-inset-top,0);
  --safe-left:env(safe-area-inset-left,0);
  --safe-right:env(safe-area-inset-right,0);
  --ease-ios:cubic-bezier(0.32,0.72,0,1);
  --ease-ios-fast:cubic-bezier(0.4,0.0,0.2,1);
}
html[data-theme="dark"]{
  --bg:#06080c;
  --surface:#0b0f17;
  --elevated:#11161f;
  --border:#1c2230;
  --border-strong:#262e3e;
  --fg:#f5f7fb;
  --fg-muted:#8b95a8;
  --fg-subtle:#4a5366;

}
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
html,body{background:var(--bg);color:var(--text);font-family:var(--font);font-weight:400;line-height:1.5;-webkit-font-smoothing:antialiased;-moz-osx-font-smoothing:grayscale;min-height:100vh;min-height:100svh;overflow-x:hidden;transition:background 0.3s,color 0.3s;text-rendering:optimizeLegibility;-webkit-text-size-adjust:100%;text-size-adjust:100%}

body{padding-left:var(--safe-left);padding-right:var(--safe-right);user-select:none;-webkit-user-select:none}

input,select,textarea{font-family:var(--font);outline:none;transition:border-color 0.2s,background 0.2s;font-size:16px;-webkit-appearance:none;border-radius:0}
input[type="text"],input[type="email"],input[type="password"],input[type="date"],input[type="number"],input[inputmode="decimal"],input[inputmode="numeric"],textarea{font-size:16px}

select option{background:var(--bg2);color:var(--text)}
::-webkit-scrollbar{width:0;display:none}
@keyframes fadeUp{from{opacity:0;transform:translateY(8px)}to{opacity:1;transform:translateY(0)}}
@keyframes fadeIn{from{opacity:0}to{opacity:1}}
@keyframes slideUp{from{transform:translate3d(0,100%,0)}to{transform:translate3d(0,0,0)}}
@keyframes slideInRight{from{opacity:0;transform:translate3d(24px,0,0)}to{opacity:1;transform:translate3d(0,0,0)}}

@keyframes pulse{0%,100%{opacity:1}50%{opacity:0.5}}
.fadeUp{animation:fadeUp 0.4s var(--ease-ios) both}
.fadeIn{animation:fadeIn 0.3s var(--ease-ios-fast) both}
.slideInR{animation:slideInRight 0.32s var(--ease-ios) both}
.slideInL{animation:slideInLeft 0.32s var(--ease-ios) both}
.m{font-family:var(--mono);font-size:13px;font-variant-numeric:tabular-nums;font-weight:400}
.lb{font-size:11px;font-weight:500;color:var(--fg-subtle);letter-spacing:0.1em;text-transform:uppercase;font-family:var(--mono)}

.rw{display:flex;justify-content:space-between;align-items:center}
.g2{display:grid;grid-template-columns:1fr 1fr;gap:10px}
.g3{display:grid;grid-template-columns:repeat(3,1fr);gap:10px}
.tab-bar{display:flex;padding:3px;margin:0 20px 20px;background:var(--elevated);border:1px solid var(--border);border-radius:10px;gap:2px}
.tb{flex:1;padding:9px 4px;border:none;border-radius:7px;background:transparent;font-size:11px;font-weight:500;color:var(--fg-muted);white-space:nowrap;transition:all 0.2s;letter-spacing:0.04em;font-family:var(--mono);text-transform:uppercase}
.tb.on{background:var(--bg);color:var(--fg);border:1px solid var(--border-strong)}
.exp-btn{width:100%;display:flex;background:var(--surface);border:1px solid var(--border);border-radius:12px;padding:14px 16px;color:var(--fg);text-align:left}
.exp-detail{background:var(--surface);border:1px solid var(--border);border-top:none;border-radius:0 0 12px 12px;padding:12px 16px;margin-top:-8px}
.bar{height:4px;background:var(--elevated);overflow:hidden;margin-top:8px;border-radius:2px}
.bar-fill{height:100%;border-radius:2px;transition:width 0.5s ease-out;background:var(--fg)}
.ms-bar{display:flex;padding:3px;margin-bottom:16px;background:var(--elevated);border:1px solid var(--border);border-radius:10px;gap:2px}
.ms{flex:1;padding:8px 0;border:none;border-radius:7px;font-size:12px;font-weight:500;background:transparent;color:var(--fg-muted);transition:all 0.2s;font-family:var(--mono);letter-spacing:0.04em}
.ms.on{background:var(--bg);color:var(--fg);border:1px solid var(--border-strong)}
.hero{position:relative;background:var(--fg);border-radius:18px;padding:24px;color:var(--bg);overflow:hidden}
.hero::before,.hero::after{content:none}
.chip{display:inline-flex;align-items:center;gap:4px;padding:4px 10px;border-radius:999px;font-size:11px;font-weight:500;font-variant-numeric:tabular-nums;font-family:var(--mono);letter-spacing:0.04em}
.chip.up{background:rgba(255,255,255,0.14);color:var(--bg);border:1px solid rgba(255,255,255,0.18)}
.chip.down{background:rgba(255,255,255,0.14);color:var(--bg);border:1px solid rgba(255,255,255,0.18)}
.chip.up-solid{background:transparent;color:var(--success);border:1px solid var(--border)}
.chip.down-solid{background:transparent;color:var(--danger);border:1px solid var(--border)}
.icon-btn{width:36px;height:36px;border:1px solid var(--border);background:var(--surface);border-radius:999px;display:flex;align-items:center;justify-content:center;color:var(--fg-muted)}
.icon-btn:hover{color:var(--fg);border-color:var(--border-strong)}
.skel{background:linear-gradient(90deg,var(--elevated) 0%,var(--surface) 50%,var(--elevated) 100%);background-size:200px 100%;animation:shimmer 1.5s infinite;border-radius:8px}
.toast-wrap{position:fixed;bottom:calc(20px + var(--safe-bottom));left:50%;transform:translateX(-50%);z-index:9999;display:flex;flex-direction:column;gap:8px;align-items:center;pointer-events:none}
.toast{background:var(--fg);color:var(--bg);padding:12px 20px;border-radius:999px;font-size:13px;font-weight:500;animation:fadeUp 0.3s ease-out;max-width:90vw;display:flex;align-items:center;gap:8px}
.toast.success{background:var(--fg);color:var(--bg);border:1px solid var(--success)}
.toast.error{background:var(--fg);color:var(--bg);border:1px solid var(--danger)}
.toast.success svg{color:var(--success)}
.toast.error svg{color:var(--danger)}
.ring-wrap{position:relative;display:inline-flex;align-items:center;justify-content:center}
.ring-wrap svg{transform:rotate(-90deg)}
.ring-bg{fill:none;stroke:var(--elevated);stroke-width:6}
.ring-fg{fill:none;stroke:var(--fg);stroke-width:6;stroke-linecap:round;transition:stroke-dashoffset 0.8s ease-out}
.empty{padding:40px 20px;text-align:center;color:var(--fg-subtle)}
.empty svg{margin-bottom:12px;opacity:0.5}
input,select,textarea{color:var(--text)}

/* Safe-area top header */
.app-header{padding-top:calc(8px + var(--safe-top))}
/* Sync chip */
.sync-chip{display:inline-flex;align-items:center;gap:6px;padding:4px 10px;border-radius:999px;font-size:10px;font-weight:500;letter-spacing:0.06em;background:transparent;border:1px solid var(--border);color:var(--fg-muted);transition:color 0.2s,border-color 0.2s;font-family:var(--mono);text-transform:uppercase}

/* Undo toast */

/* Action sheet */
.sheet-overlay{position:fixed;inset:0;background:rgba(11,18,32,0.40);backdrop-filter:blur(8px);-webkit-backdrop-filter:blur(8px);z-index:150;display:flex;flex-direction:column;justify-content:flex-end;animation:fadeIn 0.2s ease-out}

function compute(){

/* Drag-to-dismiss for bottom sheets (iOS-style) */
function attachSheetDrag(){
  var sheets=document.querySelectorAll(".sheet-overlay, [role='dialog'][aria-modal='true']");
  sheets.forEach(function(overlay){
    if(overlay._dragAttached)return;
    overlay._dragAttached=true;
    var panel=overlay.querySelector(".sheet-panel")||overlay.querySelector("div[style*='border-radius:24px 24px 0 0']")||overlay.querySelector("div[style*='border-radius:20px 20px 0 0']")||overlay.children[0];
    if(!panel)return;
    var grip=overlay.querySelector(".sheet-grip")||overlay.querySelector("div[style*='width:36px;height:4px;background:var(--border)']");
    var startY=0,curY=0,dragging=false;
    var handleStart=function(ev){
      var t=ev.touches?ev.touches[0]:ev;
      // only drag when starting from top area of panel (grip or first 60px)
      var rect=panel.getBoundingClientRect();
      if(t.clientY-rect.top>80&&!(grip&&grip.contains(ev.target)))return;
      // and only if panel scrolled to top
      if(panel.scrollTop>0)return;
      startY=t.clientY;curY=startY;dragging=true;
      panel.style.transition="none";
    };
    var handleMove=function(ev){
      if(!dragging)return;
      var t=ev.touches?ev.touches[0]:ev;
      curY=t.clientY;
      var dy=Math.max(0,curY-startY);
      panel.style.transform="translate3d(0,"+dy+"px,0)";
      if(dy>10&&ev.cancelable)ev.preventDefault();
    };
    var handleEnd=function(){
      if(!dragging)return;
      dragging=false;
      var dy=curY-startY;
      panel.style.transition="transform 0.28s var(--ease-ios)";
      if(dy>120){
        // dismiss
        panel.style.transform="translate3d(0,100%,0)";
        haptic("light");
        setTimeout(function(){
          // close all sheets — simplest approach
          showAction=false;showMore=false;showSet=false;showAdd=false;showStmt=false;showGoal=false;showRec=false;showInc=false;showCat=false;
          render();
        },280);
      } else {
        panel.style.transform="translate3d(0,0,0)";
      }
    };
    panel.addEventListener("touchstart",handleStart,{passive:true});
    panel.addEventListener("touchmove",handleMove,{passive:false});
    panel.addEventListener("touchend",handleEnd);
    panel.addEventListener("touchcancel",handleEnd);
  });
}
/* Haptic feedback via Web Vibration API (works on Android; iOS only via PWA gesture trigger sometimes) */
function haptic(intensity){
  try{
    if(!navigator.vibrate)return;
    if(intensity==="light")navigator.vibrate(8);
    else if(intensity==="medium")navigator.vibrate(15);
    else if(intensity==="heavy")navigator.vibrate(25);
    else if(intensity==="success")navigator.vibrate([10,30,10]);
    else if(intensity==="warning")navigator.vibrate([20,40,20]);
    else if(intensity==="selection")navigator.vibrate(5);
    else navigator.vibrate(10);
  }catch(_e){}
}
function toast(msg,type){
  if(type==="success")haptic("success");else if(type==="error")haptic("warning");
  var w=document.getElementById("toast-wrap");
  if(!w){w=document.createElement("div");w.id="toast-wrap";w.className="toast-wrap";document.body.appendChild(w);}
  var t=document.createElement("div");
  t.className="toast"+(type?" "+type:"");
  t.setAttribute("role",type==="error"?"alert":"status");
  t.setAttribute("aria-live",type==="error"?"assertive":"polite");
  var icon="";
  if(type==="success")icon='<svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="3" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true"><polyline points="20 6 9 17 4 12"/></svg>';
  else if(type==="error")icon='<svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" aria-hidden="true"><circle cx="12" cy="12" r="10"/><line x1="15" y1="9" x2="9" y2="15"/><line x1="9" y1="9" x2="15" y2="15"/></svg>';
  t.innerHTML=icon+'<span>'+e(msg)+'</span>';
  w.appendChild(t);
  setTimeout(function(){t.style.opacity="0";t.style.transform="translateY(8px)";t.style.transition="all 0.3s";setTimeout(function(){t.remove();},300);},2400);
}

/* Undo system — schedule a destructive action with chance to revert */
function scheduleUndo(label,doFn,undoFn){
  // Execute the destructive action, then show toast with Undo
  doFn();
  if(undoTimer)clearTimeout(undoTimer);
  var entry={label:label,undoFn:undoFn,t:Date.now()};
  undoStack.push(entry);
  showUndoToast(entry);
  undoTimer=setTimeout(function(){
    undoStack=undoStack.filter(function(x){return x!==entry;});
    var w=document.getElementById("toast-wrap");
    if(w){var el=document.getElementById("undo-toast-"+entry.t);if(el)el.remove();}
  },5000);
}
function showUndoToast(entry){
  var w=document.getElementById("toast-wrap");
  if(!w){
    w=document.createElement("div");w.id="toast-wrap";w.className="toast-wrap";document.body.appendChild(w);
  }
  // remove previous undo toasts
  Array.prototype.slice.call(w.querySelectorAll(".toast.undo")).forEach(function(t){t.remove();});
  var el=document.createElement("div");
  el.className="toast undo";
  el.id="undo-toast-"+entry.t;
  el.setAttribute("role","status");
  el.setAttribute("aria-live","polite");
  el.innerHTML='<span style="font-size:13px">'+e(entry.label)+'</span><button type="button">Anular</button>';
  el.querySelector("button").onclick=function(){
    try{entry.undoFn();}catch(err){console.error(err);}
    undoStack=undoStack.filter(function(x){return x!==entry;});
    el.remove();
    persistUser();
    render();
  };
  w.appendChild(el);
}

  var liquid=0;
  ca.forEach(function(a){if(a.c==="Liquidez")liquid+=a.v;});
  // Recurring monthly income (only the recurring ones)
  var monthlyIncome=0;
  incomes.forEach(function(i){if(i.recurring!==false)monthlyIncome+=(i.amount||0);});
  // Recurring monthly expenses + loan payment
  var monthlyRecExpense=0;
  recurring.forEach(function(r){monthlyRecExpense+=(r.amount||0);});
  var loanPay=getLoan().pay||0;
  // Average non-recurring expense from history (per month)
  var nonRecExpenses=[];
  var _byC=getByC();
  for(var mIdx=0;mIdx<4;mIdx++){
    var t=0;
    Object.keys(_byC).forEach(function(k){if(_byC[k]&&_byC[k][mIdx]!=null)t+=_byC[k][mIdx];});
    nonRecExpenses.push(t);
  }
  var avgNonRec=nonRecExpenses.slice(0,3).reduce(function(s,v){return s+v;},0)/3;
  // Subtract recurring portion (rough estimate — recurring is already included in byC)
  // For projection, just use avg as "discretionary" floor
  var discretionary=Math.max(avgNonRec-monthlyRecExpense-loanPay,200);
  var rows=[];
  var bal=liquid;
  var monthNames=["Jan","Fev","Mar","Abr","Mai","Jun","Jul","Ago","Set","Out","Nov","Dez"];
  for(var m=1;m<=months;m++){
    var d=new Date(now.getFullYear(),now.getMonth()+m,1);
    var inc=monthlyIncome;
    // One-off incomes in this month
    var ymStr=d.toISOString().slice(0,7);
    incomes.forEach(function(i){if(i.recurring===false&&i.date&&i.date.indexOf(ymStr)===0)inc+=(i.amount||0);});
    var exp=monthlyRecExpense+loanPay+discretionary;
    bal=bal+inc-exp;
    rows.push({label:monthNames[d.getMonth()]+" "+String(d.getFullYear()).slice(-2),income:inc,expense:exp,balance:bal});
  }
  return{startBalance:liquid,monthlyIncome:monthlyIncome,monthlyRecExpense:monthlyRecExpense,loanPay:loanPay,avgDiscretionary:discretionary,rows:rows};
}

// Detect subscription candidates from addedExp: same desc occurring 2+ times in last 90 days
function detectSubscriptions(){
  var now=Date.now();
  var dayMs=86400000;
  var byKey={};
  addedExp.forEach(function(x){
    if(!x.date||!x.desc)return;
    var d=new Date(x.date);
    if(now-d.getTime()>90*dayMs)return;
    var key=x.desc.toLowerCase().trim().replace(/\s+/g," ").substring(0,40);
    if(!byKey[key])byKey[key]={desc:x.desc,occurrences:[],totalAmount:0,cat:x.cat};
    byKey[key].occurrences.push({date:x.date,amount:x.amount});
    byKey[key].totalAmount+=x.amount;
  });
  var suggestions=[];
  Object.keys(byKey).forEach(function(k){
    var g=byKey[k];
    if(g.occurrences.length<2)return;
    // Check if already in recurring
    var existing=recurring.find(function(r){return r.name.toLowerCase()===k;});
    if(existing)return;
    // Avg amount and approximate monthly
    var avg=g.totalAmount/g.occurrences.length;
    suggestions.push({desc:g.desc,count:g.occurrences.length,avgAmount:avg,monthlyEstimate:avg,cat:g.cat,key:k});
  });
  return suggestions.sort(function(a,b){return b.count-a.count;}).slice(0,5);
}

// Apply auto-categorization rules to a description; returns new cat or null
function applyRules(desc){
  if(!rules||!rules.length||!desc)return null;
  var d=desc.toLowerCase();
  for(var i=0;i<rules.length;i++){
    var r=rules[i];
    if(!r.pattern)continue;
    if(d.indexOf(r.pattern.toLowerCase())>-1)return r.cat;
  }
  return null;
}

// Financial Health Score 0-100 — based on emergency fund, savings rate, debt ratio, budget adherence
function healthScore(){
  var newU=isNewUser();
  if(newU)return {score:0,grade:"-",breakdown:[],recommendations:[]};
  var C=compute();
  var s=monthlySummary();
  var ef=emergencyFund();
  var br=[];
  // 1. Emergency fund (0-30): 6+ months = 30, 3 months = 15, 1 month = 5
  var efPts=Math.min(ef.months/6*30,30);
  br.push({label:"Fundo de emergencia",pts:Math.round(efPts),max:30,detail:ef.months.toFixed(1)+" meses"});
  // 2. Savings rate (0-25): 20%+ = 25, 10% = 12, 5% = 5
  var srPts=Math.max(0,Math.min(s.rate/20*25,25));
  br.push({label:"Taxa de poupanca",pts:Math.round(srPts),max:25,detail:s.rate.toFixed(0)+"%"});
  // 3. Debt-to-asset (0-20): <30% = 20, 60% = 10, 100% = 0
  var dta=C.tA>0?(C.loan.out/C.tA*100):(C.loan.out>0?100:0);
  var dtaPts=Math.max(0,20-dta/5);
  br.push({label:"Divida vs ativos",pts:Math.round(dtaPts),max:20,detail:C.loan.out>0?dta.toFixed(0)+"%":"sem divida"});
  // 4. Budget adherence (0-15): % of categories not over budget
  var _byCh=getByC();
  var totCat=0,okCat=0;
  bdg.forEach(function(b){
    var monthIdx=3;
    var vs=_byCh[b.id]||[0,0,0,0];
    var val=vs[monthIdx]+(addedExp.filter(function(x){return x.cat===b.id;}).reduce(function(s,x){return s+x.amount;},0));
    if(val>0){totCat++;if(val<=b.lm)okCat++;}
  });
  var baPts=totCat>0?(okCat/totCat*15):15;
  br.push({label:"Adesao ao orcamento",pts:Math.round(baPts),max:15,detail:totCat>0?okCat+"/"+totCat+" categorias":"sem despesas"});
  // 5. Goal progress (0-10): average % across goals
  var gpPts=0;
  if(goals.length>0){
    var sum=0;goals.forEach(function(g){sum+=(g.target>0?Math.min(g.current/g.target,1):0);});
    gpPts=sum/goals.length*10;
  }
  br.push({label:"Progresso de metas",pts:Math.round(gpPts),max:10,detail:goals.length>0?goals.length+" metas":"sem metas"});
  var score=Math.round(efPts+srPts+dtaPts+baPts+gpPts);
  var grade=score>=85?"Excelente":score>=70?"Bom":score>=50?"Razoavel":score>=30?"Fragil":"Critico";
  // Recommendations: pick 3 lowest scoring areas (or zero)
  var recs=[];
  br.slice().sort(function(a,b){return (a.pts/a.max)-(b.pts/b.max);}).slice(0,3).forEach(function(b){
    if(b.label==="Fundo de emergencia"&&b.pts<20)recs.push("Aumenta a tua reserva. Objetivo: 6 meses de despesa media.");
    else if(b.label==="Taxa de poupanca"&&b.pts<15)recs.push("Poupa pelo menos 15% do que ganhas todos os meses.");
    else if(b.label==="Divida vs ativos"&&b.pts<10)recs.push("Reduz divida activa para baixo de 30% dos teus ativos.");
    else if(b.label==="Adesao ao orcamento"&&b.pts<10)recs.push("Reve os limites das categorias que ultrapassaste este mes.");
    else if(b.label==="Progresso de metas"&&b.pts<5)recs.push("Cria pelo menos uma meta de poupanca para teres direccao.");
  });
  return {score:score,grade:grade,breakdown:br,recommendations:recs};
}

// Emergency fund analysis: how many months covered
function emergencyFund(){
  var ca=getAccts();
  var safe=0;
  ca.forEach(function(a){if(a.c==="Liquidez"||a.c==="Poupanca")safe+=a.v;});
  // Average monthly expense (recurring + avg discretionary + loan)
  var monthlyRec=0;recurring.forEach(function(r){monthlyRec+=(r.amount||0);});
  var loanPay=getLoan().pay||0;
  var nonRec=[];
  var _byC=getByC();
  for(var mIdx=0;mIdx<4;mIdx++){
    var t=0;Object.keys(_byC).forEach(function(k){if(_byC[k]&&_byC[k][mIdx]!=null)t+=_byC[k][mIdx];});
    nonRec.push(t);
  }
  var avgNonRec=nonRec.slice(0,3).reduce(function(s,v){return s+v;},0)/3;
  var avgMonthly=Math.max(avgNonRec,monthlyRec+loanPay+300);
  var months=avgMonthly>0?safe/avgMonthly:0;
  return{safe:safe,avgMonthly:avgMonthly,months:months};
}

function monthlySummary(){
  // Compute current period (em=3 = current month partial)
  var monthIdx=em>=3?3:em;
  var nowISO=new Date().toISOString().slice(0,7); // YYYY-MM
  // Start from hardcoded salary fallback if no incomes registered
  var inc=0;
  if(incomes.length>0){
    // Recurring incomes always count
    incomes.forEach(function(i){
      if(i.recurring!==false)inc+=(i.amount||0);
      else if(i.date&&i.date.indexOf(nowISO)===0)inc+=(i.amount||0);
    });
  }else{
    // Fallback to hardcoded salary (empty if new user)
    var _sal=getSal();
    inc=(em<3&&_sal[em])?_sal[em]:(_sal[em]||0);
  }
  // Sum expenses for the month from byC + addedExp
  var exp=0;
  var _byCm=getByC();
  Object.keys(_byCm).forEach(function(k){if(_byCm[k]&&_byCm[k][monthIdx]!=null)exp+=_byCm[k][monthIdx];});
  addedExp.forEach(function(x){if(monthIdx===3)exp+=x.amount;});
  // Add recurring expenses
  recurring.forEach(function(r){exp+=(r.amount||0);});
  var saved=inc-exp;
  var rate=inc>0?(saved/inc)*100:0;
  return{inc:inc,exp:exp,saved:saved,rate:rate};
}

/* ══ CALENDAR ══ */
var calOffset=0; // months from current
function rCalendar(){
  var now=new Date();
  var d=new Date(now.getFullYear(),now.getMonth()+calOffset,1);
  var year=d.getFullYear(),month=d.getMonth();
  var monthNames=["Janeiro","Fevereiro","Marco","Abril","Maio","Junho","Julho","Agosto","Setembro","Outubro","Novembro","Dezembro"];
  var daysInMonth=new Date(year,month+1,0).getDate();
  var firstDay=new Date(year,month,1).getDay(); // 0=Sun
  // Monday-first offset
  var startOffset=firstDay===0?6:firstDay-1;
  // Build events map: day -> [{type, name, amount, color}]
  var events={};
  // Loan payment (only if user has loan)
  var _lnC=getLoan();
  if(_lnC.pay>0){
    var loanDay=28;
    events[loanDay]=events[loanDay]||[];
    events[loanDay].push({type:"loan",name:"Credito Habitacao",amount:-_lnC.pay,color:"var(--signal)"});
  }
  // Recurring expenses
  recurring.forEach(function(r){
    var day=Math.min(parseInt(r.day)||1,daysInMonth);
    events[day]=events[day]||[];
    events[day].push({type:"rec_out",name:r.name,amount:-(r.amount||0),color:"var(--orange)"});
  });
  // Recurring incomes
  incomes.forEach(function(i){
    if(i.recurring!==false){
      var day=Math.min(parseInt(i.day)||1,daysInMonth);
      events[day]=events[day]||[];
      events[day].push({type:"income",name:i.name,amount:(i.amount||0),color:"var(--success)"});
    }else if(i.date){
      // one-off — check if in this month
      var dt=new Date(i.date);
      if(dt.getFullYear()===year&&dt.getMonth()===month){
        var dd=dt.getDate();
        events[dd]=events[dd]||[];
        events[dd].push({type:"income_one",name:i.name,amount:(i.amount||0),color:"var(--success)"});
      }
    }
  });
  // Added expenses with dates in this month
  addedExp.forEach(function(x){
    if(!x.date)return;
    var dt=new Date(x.date);
    if(dt.getFullYear()===year&&dt.getMonth()===month){
      var dd=dt.getDate();
      events[dd]=events[dd]||[];
      events[dd].push({type:"exp",name:x.desc,amount:-x.amount,color:"var(--signal)"});
    }
  });
  // Totals
  var totalIn=0,totalOut=0;
  Object.keys(events).forEach(function(k){events[k].forEach(function(ev){if(ev.amount>0)totalIn+=ev.amount;else totalOut+=Math.abs(ev.amount);});});
  var net=totalIn-totalOut;
  var todayDate=now.getDate();
  var isCurrentMonth=year===now.getFullYear()&&month===now.getMonth();

  var o='<div class="fadeUp" style="padding:0 20px 24px">';
  // Header navigator
  o+='<div class="rw" style="margin-bottom:14px">';
  o+='<button onclick="calOffset--;render()" class="icon-btn" aria-label="Mes anterior"><svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" aria-hidden="true"><polyline points="15 18 9 12 15 6"/></svg></button>';
  o+='<div style="text-align:center;flex:1"><div style="font-size:16px;font-weight:700">'+monthNames[month]+' '+year+'</div>';

  // Summary
  o+='<div class="g3" style="margin-bottom:16px">';
  o+='<div class="cd" style="padding:12px"><div class="lb" style="font-size:9px">Receita</div><div class="m" style="font-size:14px;font-weight:700;color:var(--success);margin-top:2px">+'+fc(totalIn)+'</div></div>';
  o+='<div class="cd" style="padding:12px"><div class="lb" style="font-size:9px">Despesa</div><div class="m" style="font-size:14px;font-weight:700;color:var(--signal);margin-top:2px">-'+fc(totalOut)+'</div></div>';
  o+='<div class="cd" style="padding:12px;border-left:3px solid '+(net>=0?"var(--success)":"var(--signal)")+'"><div class="lb" style="font-size:9px">Net</div><div class="m" style="font-size:14px;font-weight:800;color:'+(net>=0?"var(--success)":"var(--signal)")+';margin-top:2px">'+(net>=0?"+":"")+fc(net)+'</div></div>';
  o+='</div>';
  // Calendar grid
  o+='<div class="cd" style="padding:14px;margin-bottom:16px">';
  o+='<div style="display:grid;grid-template-columns:repeat(7,1fr);gap:2px;margin-bottom:6px">';
  ["S","T","Q","Q","S","S","D"].forEach(function(dn){o+='<div style="text-align:center;font-size:9px;color:var(--text3);font-weight:700;padding:4px 0">'+dn+'</div>';});
  o+='</div>';
  o+='<div style="display:grid;grid-template-columns:repeat(7,1fr);gap:2px">';
  // Empty cells before first day
  for(var i=0;i<startOffset;i++){o+='<div></div>';}
  for(var day=1;day<=daysInMonth;day++){
    var ev=events[day]||[];
    var hasIn=ev.some(function(e){return e.amount>0;});
    var hasOut=ev.some(function(e){return e.amount<0;});
    var isToday=isCurrentMonth&&day===todayDate;
    var bg=isToday?"var(--blue)":(ev.length>0?"var(--bg3)":"transparent");
    var col=isToday?"#fff":(ev.length>0?"var(--text)":"var(--text2)");
    o+='<button onclick="showCalDay='+day+';render()" style="aspect-ratio:1;display:flex;flex-direction:column;align-items:center;justify-content:center;border:'+(showCalDay===day?"2px solid var(--blue)":"none")+';background:'+bg+';color:'+col+';border-radius:8px;font-size:12px;font-weight:'+(isToday?"700":"500")+';position:relative;padding:2px">';
    o+='<span>'+day+'</span>';
    if(ev.length>0){
      o+='<div style="display:flex;gap:2px;margin-top:2px">';
      if(hasIn)o+='<div style="width:4px;height:4px;border-radius:50%;background:var(--success)"></div>';
      if(hasOut)o+='<div style="width:4px;height:4px;border-radius:50%;background:var(--signal)"></div>';
      o+='</div>';
    }
    o+='</button>';
  }
  o+='</div></div>';
  // Selected day details
  if(showCalDay&&events[showCalDay]){
    o+='<div class="cd fadeUp" style="padding:16px;margin-bottom:16px">';
    o+='<div class="rw" style="margin-bottom:10px"><div class="lb">Dia '+showCalDay+'</div><button onclick="showCalDay=null;render()" style="background:none;border:none;color:var(--text3);font-size:18px;line-height:1">&times;</button></div>';
    events[showCalDay].forEach(function(ev){
      o+='<div class="rw" style="padding:8px 0;border-top:1px solid var(--bg3)"><div style="display:flex;align-items:center;gap:8px"><div style="width:6px;height:6px;border-radius:50%;background:'+ev.color+'"></div><span style="font-size:13px">'+e(ev.name)+'</span></div><span class="m" style="font-size:13px;font-weight:700;color:'+ev.color+'">'+(ev.amount>0?"+":"")+fm(ev.amount)+'</span></div>';
    });
    o+='</div>';
  }
  // Legend
  o+='<div class="cd" style="padding:12px 14px"><div class="lb" style="margin-bottom:8px">Legenda</div>';
  o+='<div style="display:flex;flex-wrap:wrap;gap:12px;font-size:11px;color:var(--text2)">';

  o+='<div style="display:flex;align-items:center;gap:5px"><div style="width:6px;height:6px;border-radius:50%;background:var(--orange)"></div>Recorrente</div>';
  o+='<div style="display:flex;align-items:center;gap:5px"><div style="width:6px;height:6px;border-radius:50%;background:var(--signal)"></div>Credito / Despesa</div>';
  o+='</div></div>';
  return o+'</div>';
}

function rGoals(){
  var o='<div class="fadeUp" style="padding:0 20px 24px">';
  if(goals.length===0){
    o+='<div class="empty"><svg width="56" height="56" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.3" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="10"/><circle cx="12" cy="12" r="6"/><circle cx="12" cy="12" r="2"/></svg>';
    o+='<div style="font-size:14px;font-weight:600;color:var(--text);margin-bottom:6px">Ainda nao tens metas</div>';
    o+='<div style="font-size:12px;line-height:1.6">Cria a tua primeira meta de poupanca:<br>fundo de emergencia, ferias, casa nova...</div></div>';
  }else{
    var totalTarget=0,totalCurrent=0;
    goals.forEach(function(g){totalTarget+=g.target||0;totalCurrent+=g.current||0;});
    var overall=totalTarget>0?(totalCurrent/totalTarget*100):0;
    o+='<div class="cd" style="margin-bottom:16px;padding:18px 20px"><div class="rw" style="margin-bottom:10px"><div class="lb">Progresso global</div><div class="m" style="font-size:13px;font-weight:700">'+overall.toFixed(0)+'%</div></div>';
    o+='<div class="bar" style="height:8px"><div class="bar-fill" style="width:'+Math.min(overall,100)+'%;background:var(--fg)"></div></div>';
    o+='<div class="rw m" style="font-size:11px;color:var(--text3);margin-top:8px"><span>'+fc(totalCurrent)+' de '+fc(totalTarget)+'</span><span>'+fc(Math.max(totalTarget-totalCurrent,0))+' restantes</span></div>';
    o+='</div>';

    goals.forEach(function(g,i){
      var pct=g.target>0?Math.min(g.current/g.target*100,100):0;
      var pctAbs=g.target>0?g.current/g.target*100:0;
      var c=g.color||"#0b1220";
      var rem=Math.max(g.target-g.current,0);
      var daysLeft=null;
      if(g.deadline){var dl=new Date(g.deadline);if(!isNaN(dl))daysLeft=Math.ceil((dl-new Date())/86400000);}
      var monthly=null;
      if(daysLeft&&daysLeft>0&&rem>0)monthly=rem/(daysLeft/30);
      o+='<div class="cd fadeUp" style="margin-bottom:12px;padding:18px;position:relative;overflow:hidden">';
      o+='<div style="position:absolute;top:0;left:0;width:4px;height:100%;background:'+c+'"></div>';
      o+='<div class="rw" style="margin-bottom:12px;margin-left:8px"><div style="flex:1"><div style="font-size:15px;font-weight:700;letter-spacing:-0.01em">'+e(g.name)+'</div>';
      if(g.deadline)o+='<div style="font-size:11px;color:'+(daysLeft!=null&&daysLeft<30?'var(--orange)':'var(--text3)')+';margin-top:2px;font-weight:500">'+(daysLeft!=null?(daysLeft>0?daysLeft+' dias restantes':'Prazo passado'):e(g.deadline))+'</div>';
      o+='</div><button onclick="editGoal(\''+g.id+'\')" class="icon-btn" style="width:32px;height:32px" aria-label="Editar meta"><svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true"><path d="M12 20h9"/><path d="M16.5 3.5a2.12 2.12 0 0 1 3 3L7 19l-4 1 1-4L16.5 3.5z"/></svg></button></div>';
      o+='<div style="display:flex;align-items:center;gap:14px;margin-left:8px">';
      // Ring
      var R=28,C2=2*Math.PI*R;
      o+='<div class="ring-wrap"><svg width="72" height="72" viewBox="0 0 72 72"><circle class="ring-bg" cx="36" cy="36" r="'+R+'"/><circle class="ring-fg" cx="36" cy="36" r="'+R+'" stroke="'+c+'" stroke-dasharray="'+C2+'" stroke-dashoffset="'+(C2-pct/100*C2)+'"/></svg><div style="position:absolute;font-size:13px;font-weight:700;color:'+c+'">'+pctAbs.toFixed(0)+'%</div></div>';
      o+='<div style="flex:1"><div class="m" style="font-size:18px;font-weight:800;letter-spacing:-0.02em">'+fc(g.current)+'</div><div class="m" style="font-size:11px;color:var(--text3);margin-top:2px">de '+fc(g.target)+'</div>';
      if(monthly!=null)o+='<div style="font-size:10px;color:var(--text2);margin-top:6px;font-weight:600">~ '+fc(monthly)+'/mes</div>';
      o+='</div></div>';
      // Quick add buttons
      o+='<div style="display:flex;gap:6px;margin-top:14px;margin-left:8px">';
      [10,50,100,500].forEach(function(amt){
        o+='<button onclick="addToGoal(\''+g.id+'\','+amt+')" style="flex:1;padding:8px 0;border:1px solid var(--border);background:transparent;color:var(--text2);border-radius:8px;font-family:var(--mono);font-size:11px;font-weight:600">+'+amt+'</button>';
      });
      o+='</div>';
      o+='</div>';
    });
  }
  return o+'</div>';
}

  if(isEdit)o+='<button onclick="deleteGoal()" style="width:100%;padding:12px 0;border:none;background:transparent;color:var(--signal);font-size:13px;font-weight:600;margin-top:8px">Eliminar meta</button>';

window.editGoal=function(id){
  var g=goals.find(function(x){return x.id===id;});
  if(!g)return;
  goalDraft={id:g.id,name:g.name,target:String(g.target),current:String(g.current),deadline:g.deadline||"",color:g.color||"#0b1220"};
  showGoal=true;render();
};
window.saveGoal=function(){
  var n=document.getElementById("gn").value.trim();
  var t=parseFloat((document.getElementById("gt").value||"0").replace(",","."));
  var c=parseFloat((document.getElementById("gc").value||"0").replace(",","."));
  var d=document.getElementById("gd").value;
  if(!n){toast("Nome obrigatorio","error");return;}
  if(isNaN(t)||t<=0){toast("Objetivo invalido","error");return;}
  if(isNaN(c)||c<0)c=0;
  if(goalDraft.id){
    var g=goals.find(function(x){return x.id===goalDraft.id;});
    if(g){g.name=n;g.target=t;g.current=c;g.deadline=d;g.color=goalDraft.color;}
  }else{
    goals.push({id:uid(),name:n,target:t,current:c,deadline:d,color:goalDraft.color||"#0b1220",createdAt:Date.now()});
  }
  persistUser();
  showGoal=false;render();
  toast(goalDraft.id?"Meta atualizada":"Meta criada","success");
};
window.deleteGoal=function(){
  if(!goalDraft.id)return;
  var id=goalDraft.id;
  var snapshot=goals.slice();
  showGoal=false;
  scheduleUndo("Meta eliminada",
    function(){goals=goals.filter(function(x){return x.id!==id;});persistUser();render();},
    function(){goals=snapshot;}
  );
};
window.addToGoal=function(id,amt){
  var g=goals.find(function(x){return x.id===id;});
  if(!g)return;
  g.current=(g.current||0)+amt;
  if(g.current>g.target*1.5)g.current=g.target;
  persistUser();render();
  toast("+"+amt+" EUR","success");
};

window.saveCat=function(){
  var nm=document.getElementById("cnm").value.trim();
  var lm=parseFloat((document.getElementById("clm").value||"0").replace(",","."));
  if(!nm){toast("Nome obrigatorio","error");return;}
  if(isNaN(lm)||lm<0)lm=0;
  if(catDraft.editId){
    var b=bdg.find(function(x){return x.id===catDraft.editId;});
    if(b){b.nm=nm;b.lm=lm;}
  }else{
    // Generate id from name
    var newId=nm.toLowerCase().replace(/[^a-z0-9]/g,"").substring(0,8)||("cat"+Date.now().toString(36).substring(-4));
    var n=1;while(bdg.find(function(x){return x.id===newId;})){newId=newId.substring(0,7)+n;n++;}
    bdg.push({id:newId,nm:nm,lm:lm});
  }
  persistUser();
  catDraft={id:"",nm:"",lm:""};
  render();
  toast(catDraft.editId?"Categoria atualizada":"Categoria criada","success");
};
window.deleteCat=function(id){
  var inUse=(byC[id]&&byC[id].some(function(v){return v>0;}))||addedExp.some(function(x){return x.cat===id;})||recurring.some(function(r){return r.cat===id;});
  if(inUse){toast("Em uso — nao pode eliminar","error");return;}
  bdg=bdg.filter(function(x){return x.id!==id;});
  persistUser();render();
  toast("Categoria eliminada","success");
};

window.restoreData=function(el){
  var f=el&&el.files&&el.files[0];
  el.value="";
  if(!f)return;
  var rd=new FileReader();
  rd.onload=function(ev){
    try{
      var d=JSON.parse(ev.target.result);
      if(typeof d!=="object"||d===null)throw new Error("formato invalido");
      if(!confirm("Restaurar substitui TODOS os dados atuais. Continuar?"))return;
      apiKey=typeof d.apiKey==="string"?d.apiKey:apiKey;
      aiHistory=Array.isArray(d.aiHistory)?d.aiHistory:[];
      dynAccts=d.dynAccts&&typeof d.dynAccts==="object"?d.dynAccts:null;
      dynSnaps=Array.isArray(d.dynSnaps)?d.dynSnaps:[];
      addedExp=Array.isArray(d.addedExp)?d.addedExp:[];
      theme=typeof d.theme==="string"?d.theme:"system";
      goals=Array.isArray(d.goals)?d.goals:[];
      recurring=Array.isArray(d.recurring)?d.recurring:[];
      incomes=Array.isArray(d.incomes)?d.incomes:[];
      if(Array.isArray(d.bdg)&&d.bdg.length>0)bdg=d.bdg;
      applyTheme(theme);
      persistUser();
      render();
      toast("Dados restaurados","success");
    }catch(err){
      console.error("Restore falhou",err);
      toast("Ficheiro invalido: "+(err.message||"erro"),"error");
    }
  };
  rd.readAsText(f);
};

/* ══ AI SCANNER ══ */
function resizeImg(file,maxW){
  maxW=maxW||1024;
  return new Promise(function(resolve){
    var img=new Image(),cnv=document.createElement("canvas"),rd=new FileReader();
    rd.onload=function(ev){img.onload=function(){var w=img.width,h=img.height;if(w>maxW){h=h*maxW/w;w=maxW;}cnv.width=w;cnv.height=h;cnv.getContext("2d").drawImage(img,0,0,w,h);resolve(cnv.toDataURL("image/jpeg",0.8).split(",")[1]);};img.src=ev.target.result;};
    rd.readAsDataURL(file);
  });
}
function readFileB64(file){
  return new Promise(function(resolve){
    var rd=new FileReader();
    rd.onload=function(ev){resolve(ev.target.result.split(",")[1]);};
    rd.readAsDataURL(file);
  });
}
function parseExcel(file){
  return new Promise(function(resolve){
    var rd=new FileReader();
    rd.onload=function(ev){
      try{
        var wb=XLSX.read(ev.target.result,{type:"array"});
        var ws=wb.Sheets[wb.SheetNames[0]];
        var csv=XLSX.utils.sheet_to_csv(ws);
        resolve(csv);
      }catch(e){resolve(null);}
    };
    rd.readAsArrayBuffer(file);
  });
}
function callAI(content,prompt,cb){
  if(!apiKey){cb({error:"API key nao configurada. Abre Definicoes."});return;}
  var msgs=[{role:"user",content:content.concat([{type:"text",text:prompt}])}];
  fetch("https://api.anthropic.com/v1/messages",{
    method:"POST",
    headers:{"Content-Type":"application/json","x-api-key":apiKey,"anthropic-version":"2023-06-01","anthropic-beta":"pdfs-2024-09-25","anthropic-dangerous-direct-browser-access":"true"},
    body:JSON.stringify({model:"claude-haiku-4-5",max_tokens:16000,system:"Responde APENAS JSON puro. Sem markdown, sem backticks.",messages:msgs})
  }).then(function(r){
    if(!r.ok) return r.text().then(function(body){throw new Error("API "+r.status+": "+body.substring(0,200));});
    return r.json();
  })
  .then(function(d){var txt=(d.content||[]).filter(function(i){return i.type==="text"}).map(function(i){return i.text}).join("");var m=txt.match(/\{[\s\S]*\}/);if(!m)throw new Error("Sem JSON.");
    try{cb(JSON.parse(m[0]));}catch(pe){
      // Try to fix truncated JSON
      var fix=m[0];
      // Remove last incomplete element after last comma
      var li=fix.lastIndexOf("},");
      if(li>-1)fix=fix.substring(0,li+1);
      // Close any open arrays and objects
      var ob=0,oa=0;for(var ci=0;ci<fix.length;ci++){if(fix[ci]==="{")ob++;if(fix[ci]==="}")ob--;if(fix[ci]==="[")oa++;if(fix[ci]==="]")oa--;}
      while(oa>0){fix+="]";oa--;}
      while(ob>0){fix+="}";ob--;}
      try{cb(JSON.parse(fix));}catch(pe2){throw pe;}
    }
  })
  .catch(function(err){
    var msg=err.message||"Erro desconhecido";
    if(msg==="Failed to fetch"||msg.indexOf("NetworkError")>-1||msg.indexOf("CORS")>-1)msg="Erro de rede/CORS. Testa a partir de HTTPS (GitHub Pages), nao de file://.";
    cb({error:msg});
  });
}

window.scanReceipt=function(el){
  var f=el.files&&el.files[0];if(!f)return;
  scScanning=true;scResult=null;render();
  resizeImg(f).then(function(b64){
    callAI([{type:"image",source:{type:"base64",media_type:"image/jpeg",data:b64}}],RCPT_PROMPT,function(res){
      scScanning=false;scResult=res;
      if(!res.error){
        if(res.total)addData.amount=String(res.total).replace(".",",");
        if(res.suggested_category)addData.cat=res.suggested_category;
        if(res.items&&res.items.length)addData.desc=res.items.map(function(i){return i.desc}).join(", ");
      }
      render();
    });
  });
};
window.scanStmt=function(el){
  var f=el.files&&el.files[0];if(!f)return;
  var name=f.name.toLowerCase();
  var isPDF=f.type==="application/pdf"||name.endsWith(".pdf");
  var isXLS=name.endsWith(".xlsx")||name.endsWith(".xls")||name.endsWith(".csv")||f.type.indexOf("spreadsheet")>-1||f.type.indexOf("excel")>-1;
  stScanning=true;stResult=null;stSel={};render();
  if(isPDF){
    readFileB64(f).then(function(b64){
      callAI([{type:"document",source:{type:"base64",media_type:"application/pdf",data:b64}}],STMT_PROMPT,function(res){
        stScanning=false;stResult=res;
        if(res.transactions)res.transactions.forEach(function(t,i){if(t.amount<0)stSel[i]=true;});
        render();
      });
    });
  }else if(isXLS){
    parseExcel(f).then(function(csv){
      if(!csv){stScanning=false;stResult={error:"Erro ao ler ficheiro."};render();return;}
      callAI([{type:"text",text:"Dados do extracto bancario:\n\n"+csv}],STMT_PROMPT,function(res){
        stScanning=false;stResult=res;
        if(res.transactions)res.transactions.forEach(function(t,i){if(t.amount<0)stSel[i]=true;});
        render();
      });
    });
  }else{
    resizeImg(f,1600).then(function(b64){
      callAI([{type:"image",source:{type:"base64",media_type:"image/jpeg",data:b64}}],STMT_PROMPT,function(res){
        stScanning=false;stResult=res;
        if(res.transactions)res.transactions.forEach(function(t,i){if(t.amount<0)stSel[i]=true;});
        render();
      });
    });
  }
};
window.toggleStSel=function(i){if(stSel[i])delete stSel[i];else stSel[i]=true;render();};
window.changeStCat=function(i,cat){if(stResult&&stResult.transactions&&stResult.transactions[i])stResult.transactions[i].category=cat;render();};
window.changeExpCat=function(i,cat){if(addedExp[i]){addedExp[i].cat=cat;persistUser();}render();};
window.doImportStmt=function(){
  if(!stResult||!stResult.transactions)return;
  var n=0;
  stResult.transactions.forEach(function(t,i){
    if(!stSel[i])return;
    addedExp.push({desc:t.desc,amount:Math.abs(t.amount),cat:t.category||"out",date:t.date||""});
    n++;
  });
  persistUser();
  stResult=null;stSel={};showStmt=false;render();
  toast(n+" transac"+(n===1?"ao":"oes")+" importadas","success");
};
window.doAddExp=function(){
  var desc=document.getElementById("adDesc").value;
  var cat=document.getElementById("adCat").value;
  var date=document.getElementById("adDate").value;
  var amt,total=null,split=null;
  if(addData.shared){
    total=parseFloat((document.getElementById("adTot").value||"0").replace(",","."));
    split=parseInt(document.getElementById("adSplit").value||"2");if(isNaN(split)||split<2)split=2;
    if(isNaN(total)||total<=0){toast("Total invalido","error");return;}
    amt=total/split;
  }else{
    amt=parseFloat((document.getElementById("adAmt").value||"0").replace(",","."));
  }
  if(!desc||isNaN(amt)||amt<=0){toast("Preenche descricao e valor","error");return;}
  var tagsRaw=(document.getElementById("adTags")||{}).value||"";
  var tags=tagsRaw.split(",").map(function(t){return t.trim().toLowerCase().replace(/\s+/g,"-");}).filter(function(t){return t.length>0;}).slice(0,5);
  // Auto-categorization via rules (only when adding new, not editing — respect user choice)
  if(addData.editIdx==null){
    var autoCat=applyRules(desc);
    if(autoCat&&autoCat!==cat&&bdg.find(function(b){return b.id===autoCat;})){
      cat=autoCat;
    }
  }
  var notes=(document.getElementById("adNotes")||{}).value||"";
  var exp={desc:desc,amount:amt,cat:cat,date:date};
  if(addData.shared){exp.shared=true;exp.total=total;exp.split=split;}
  if(tags.length>0)exp.tags=tags;
  if(notes.trim())exp.notes=notes.trim();
  var msg="";
  if(addData.editIdx!=null&&addedExp[addData.editIdx]){
    addedExp[addData.editIdx]=exp;
    msg="Despesa atualizada";
  }else{
    addedExp.push(exp);
    msg=addData.shared?"Despesa partilhada adicionada ("+fm(amt)+" tua parte)":"Despesa adicionada";
  }
  persistUser();
  addData={desc:"",amount:"",cat:"rest",date:new Date().toISOString().slice(0,10),shared:false,total:"",split:"2"};
  scResult=null;showAdd=false;render();
  toast(msg,"success");
};

// Simple markdown renderer (subset: bold, italic, code, lists, tables, line breaks)
function renderMD(t){
  if(!t)return"";
  var s=e(t);
  // Tables: detect blocks of | ... | lines
  s=s.replace(/((?:^|\n)\|[^\n]+\|(?:\n\|[^\n]+\|)+)/g,function(m){
    var lines=m.trim().split("\n");
    if(lines.length<2)return m;
    var header=lines[0].split("|").map(function(c){return c.trim();}).filter(function(c){return c!=="";});
    var sep=lines[1].match(/^\|?\s*[-:]+/);
    var bodyStart=sep?2:1;
    var rows=lines.slice(bodyStart).map(function(l){return l.split("|").map(function(c){return c.trim();}).filter(function(c){return c!=="";});});
    var out='<table style="border-collapse:collapse;width:100%;margin:8px 0;font-size:11px"><thead><tr>';
    header.forEach(function(h){out+='<th style="text-align:left;padding:6px 8px;border-bottom:1px solid var(--border);color:var(--text2);font-weight:600;font-size:10px;text-transform:uppercase;letter-spacing:0.04em">'+h+'</th>';});
    out+='</tr></thead><tbody>';
    rows.forEach(function(r){
      out+='<tr>';
      r.forEach(function(c){out+='<td style="padding:6px 8px;border-bottom:1px solid var(--bg3);color:var(--text)">'+c+'</td>';});
      out+='</tr>';
    });
    return out+'</tbody></table>';
  });
  // Bold
  s=s.replace(/\*\*([^*\n]+)\*\*/g,'<b>$1</b>');
  // Inline code
  s=s.replace(/`([^`\n]+)`/g,'<code style="font-family:var(--mono);background:var(--bg3);padding:1px 5px;border-radius:4px;font-size:11px">$1</code>');
  // Italics (avoid ** already replaced)
  s=s.replace(/(^|[^\*])\*([^*\n]+)\*([^\*]|$)/g,'$1<i>$2</i>$3');
  // Lists
  s=s.replace(/(^|\n)([-*])\s+(.+)/g,'$1<div style="padding:2px 0;padding-left:14px;position:relative"><span style="position:absolute;left:0;color:var(--blue)">&bull;</span>$3</div>');
  // Headings (simple)
  s=s.replace(/(^|\n)#{1,3}\s+(.+)/g,'$1<div style="font-weight:700;margin-top:8px;margin-bottom:4px;font-size:13px">$2</div>');
  // Line breaks (only outside tables, simple approach)
  s=s.replace(/\n\n/g,'<div style="height:6px"></div>');
  s=s.replace(/\n/g,'<br>');
  return s;
}

function buildAIContext(){
  var C=compute();
  var today=new Date().toISOString().slice(0,10);
  var monthNames=["Jan","Fev","Mar","Abr"];
  var ctx={
    today:today,
    currentMonth:today.slice(0,7),
    accounts:getAccts().map(function(a){return{bank:a.b,type:a.t,balance:a.v,note:a.n||null,category:a.c};}),
    totalAssets:C.tA,
    netWorth:C.nW,
    loan:{capital:ln.cap,outstanding:ln.out,payment:ln.pay,rate:2.7,nextPayment:"28."+(new Date().getMonth()+2).toString().padStart(2,"0")},
    incomes:incomes.map(function(i){return{name:i.name,amount:i.amount,source:i.source,recurring:i.recurring!==false,day:i.day,date:i.date||null};}),
    recurring:recurring.map(function(r){return{name:r.name,amount:r.amount,day:r.day,category:r.cat};}),
    goals:goals.map(function(g){return{name:g.name,target:g.target,current:g.current,deadline:g.deadline||null,progress:g.target>0?(g.current/g.target*100).toFixed(0)+"%":"0%"};}),
    budgetCategories:bdg.map(function(b){return{id:b.id,name:b.nm,monthlyLimit:b.lm};}),
    historicalExpensesByCategory:{},
    addedExpenses:addedExp.slice(-100).map(function(x){return{desc:x.desc,amount:x.amount,category:x.cat,date:x.date,shared:!!x.shared,total:x.total||null,tags:x.tags||null};}),
    netWorthHistory:getAllHist().slice(-12)
  };
  // Historical by category (with month labels)
  Object.keys(byC).forEach(function(k){
    var arr={};byC[k].forEach(function(v,i){arr[monthNames[i]||"M"+i]=v;});
    ctx.historicalExpensesByCategory[k]=arr;
  });
  return ctx;
}

window.sendAI=function(){
  var el=document.getElementById("aiInput");
  if(!el)return;
  var cmd=el.value.trim();
  if(!cmd||aiLoading)return;
  aiLoading=true;render();

  var ctx=buildAIContext();
  var today=ctx.today;
  var dd=today.slice(8,10)+"."+today.slice(5,7);

  var sysPrompt='Es o assistente financeiro PROOF. FINANCE. Tens acesso aos dados do utilizador (em CONTEXTO) e respondes em portugues (PT-PT).\n\n'
    +'O utilizador pode pedir:\n\n'
    +'A) PERGUNTA / ANALISE (mostra-me, quais, quantos, procura, compara, lista, analisa, top, sugere, audita)\n'
    +'   Responde com TEXTO em portugues, usando markdown simples:\n'
    +'   - **negrito** para destaques\n'
    +'   - Listas com - item\n'
    +'   - Tabelas markdown (| col | col |) quando ajuda a leitura\n'
    +'   - Valores em formato europeu: 1.234,56 EUR\n'
    +'   - Se a resposta tem dados financeiros, da contexto e conclusoes acionaveis\n'
    +'   - Conciso (max ~250 palavras), direto, sem preambulos\n\n'
    +'B) ACAO (registar, adicionar, atualizar, guardar, criar, eliminar, snapshot)\n'
    +'   Responde APENAS JSON puro (sem markdown):\n'
    +'   {"actions":[...],"message":"resumo do que fizeste"}\n\n'
    +'   Tipos de actions:\n'
    +'   - update_balance: {"type":"update_balance","account_bank":"Bankinter","account_type":"Conta a Ordem","value":584.64,"note":""}\n'
    +'     account_bank EXACTO: Bankinter, Activobank, Moey, Trade Republic, XTB, Goparity, Raize\n'
    +'     account_type EXACTO: Conta a Ordem, Poupanca, Corretagem, Private Markets, Rend. Fixo, Transacoes, Planos Invest., P2P Lending\n'
    +'     Bankinter: dividir total por 2 (conta partilhada), por o total na note\n'
    +'   - add_expense: {"type":"add_expense","desc":"...","amount":0.00,"cat":"rest","date":"YYYY-MM-DD","tags":["tag1"]}\n'
    +'   - add_income: {"type":"add_income","name":"...","amount":0,"source":"salary","recurring":true,"day":25}\n'
    +'   - add_goal: {"type":"add_goal","name":"...","target":0,"current":0,"deadline":"YYYY-MM-DD"}\n'
    +'   - add_recurring: {"type":"add_recurring","name":"...","amount":0,"cat":"sub","day":1}\n'
    +'   - snapshot: {"type":"snapshot","label":"'+dd+'","liq":0,"poup":0,"inv":0,"div":'+ln.out+',"xP":0,"xT":0,"tC":0}\n\n'
    +'COMO DECIDIR? Verbos imperativos (adiciona/regista/atualiza/cria/guarda) -> ACAO. Verbos interrogativos ou analise (quanto/quais/lista/mostra/procura/compara/audita/sugere) -> ANALISE.\n\n'
    +'CONTEXTO (dados atuais do utilizador):\n'+JSON.stringify(ctx).substring(0,15000);

  fetch("https://api.anthropic.com/v1/messages",{
    method:"POST",
    headers:{"Content-Type":"application/json","x-api-key":apiKey,"anthropic-version":"2023-06-01","anthropic-dangerous-direct-browser-access":"true"},
    body:JSON.stringify({model:"claude-haiku-4-5",max_tokens:4000,system:sysPrompt,messages:[{role:"user",content:cmd}]})
  }).then(function(r){
    if(!r.ok)return r.text().then(function(b){throw new Error("API "+r.status+": "+b.substring(0,100));});
    return r.json();
  }).then(function(d){
    var txt=(d.content||[]).filter(function(i){return i.type==="text"}).map(function(i){return i.text}).join("").trim();
    // Try to detect JSON (starts with { and has "actions")
    var isJSON=false;
    var jsonMatch=txt.match(/^\s*(\{[\s\S]*\})\s*$/);
    var res=null;
    if(jsonMatch){
      try{res=JSON.parse(jsonMatch[1]);isJSON=Array.isArray(res.actions);}catch(_e){}
    }
    var entry;
    if(isJSON){
      // ACTION mode
      entry={date:new Date().toLocaleString("pt-PT"),cmd:cmd,actions:res.actions||[],msg:res.message||"",ok:true,mode:"action"};
      if(!dynAccts)dynAccts={};
      (res.actions||[]).forEach(function(a){
        try{
          if(a.type==="update_balance"&&a.account_bank&&a.account_type){
            var key=a.account_bank+"_"+a.account_type;
            dynAccts[key]={v:Number(a.value)||0,d:new Date().toISOString().slice(0,10).replace(/-/g,"."),n:a.note||null};
          }else if(a.type==="snapshot"&&a.label){
            dynSnaps.push({l:a.label,liq:Number(a.liq)||0,poup:Number(a.poup)||0,inv:Number(a.inv)||0,div:Number(a.div)||77555.06,xP:Number(a.xP)||0,xT:Number(a.xT)||0,tC:Number(a.tC)||0});
          }else if(a.type==="add_expense"&&a.desc){
            addedExp.push({desc:String(a.desc).substring(0,60),amount:Math.abs(Number(a.amount)||0),cat:a.cat||"out",date:a.date||"",tags:Array.isArray(a.tags)?a.tags.slice(0,5):undefined});
          }else if(a.type==="add_income"&&a.name){
            var rec=a.recurring!==false;var day=parseInt(a.day);if(isNaN(day)||day<1||day>31)day=1;
            incomes.push({id:uid(),name:String(a.name).substring(0,60),amount:Math.abs(Number(a.amount)||0),source:a.source||"salary",recurring:rec,day:day,date:a.date||"",createdAt:Date.now()});
          }else if(a.type==="add_goal"&&a.name){
            goals.push({id:uid(),name:String(a.name).substring(0,60),target:Number(a.target)||0,current:Number(a.current)||0,deadline:a.deadline||"",color:a.color||"#0b1220",createdAt:Date.now()});
          }else if(a.type==="add_recurring"&&a.name){
            var rd=parseInt(a.day);if(isNaN(rd)||rd<1||rd>31)rd=1;
            recurring.push({id:uid(),name:String(a.name).substring(0,60),amount:Number(a.amount)||0,day:rd,cat:a.cat||"sub",createdAt:Date.now()});
          }
        }catch(_e){}
      });
    }else{
      // ANALYSIS mode
      entry={date:new Date().toLocaleString("pt-PT"),cmd:cmd,analysis:txt,ok:true,mode:"analysis"};
    }
    persistUser();
    aiHistory.push(entry);
    aiLoading=false;
    render();
    setTimeout(function(){var el=document.getElementById("aiInput");if(el)el.value="";},50);
  }).catch(function(err){
    aiHistory.push({date:new Date().toLocaleString("pt-PT"),cmd:cmd,err:err.message});
    persistUser();
    aiLoading=false;
    render();
  });
};

window.aiImportFile=function(el){
  var f=el&&el.files&&el.files[0];
  el.value="";
  if(!f)return;
  if(!apiKey){toast("Configura API key nas Definicoes","error");return;}
  if(f.size>20*1024*1024){toast("Ficheiro demasiado grande (max 20MB)","error");return;}
  var name=(f.name||"").toLowerCase();
  var isPDF=f.type==="application/pdf"||name.endsWith(".pdf");
  var isXLS=name.endsWith(".xlsx")||name.endsWith(".xls")||name.endsWith(".csv")||(f.type||"").indexOf("spreadsheet")>-1||(f.type||"").indexOf("excel")>-1;
  aiImportLoading=true;aiImport=null;aiImportSel={};render();
  var handler=function(res){
    aiImportLoading=false;
    if(res.error){aiImport={error:res.error};}
    else{
      aiImport=res;
      aiImportSel={};
      (res.actions||[]).forEach(function(_,i){aiImportSel[i]=true;});
    }
    render();
  };
  if(isPDF){
    readFileB64(f).then(function(b64){
      callAI([{type:"document",source:{type:"base64",media_type:"application/pdf",data:b64}}],AI_IMPORT_PROMPT,handler);
    });
  }else if(isXLS){
    parseExcel(f).then(function(csv){
      if(!csv){aiImportLoading=false;aiImport={error:"Nao consegui ler o ficheiro Excel/CSV."};render();return;}
      callAI([{type:"text",text:"Dados do ficheiro ("+e(f.name)+"):\n\n"+csv}],AI_IMPORT_PROMPT,handler);
    });
  }else{
    // Image (camera or gallery)
    resizeImg(f,1600).then(function(b64){
      callAI([{type:"image",source:{type:"base64",media_type:"image/jpeg",data:b64}}],AI_IMPORT_PROMPT,handler);
    });
  }
};

window.applyAIImport=function(){
  if(!aiImport||!aiImport.actions)return;
  var actions=aiImport.actions;
  var applied={balance:0,expense:0,income:0,goal:0,recurring:0,snapshot:0};
  if(!dynAccts)dynAccts={};
  var todayD=new Date().toISOString().slice(0,10).replace(/-/g,".");
  actions.forEach(function(a,i){
    if(!aiImportSel[i])return;
    try{
      if(a.type==="update_balance"&&a.account_bank&&a.account_type){
        var key=a.account_bank+"_"+a.account_type;
        dynAccts[key]={v:Number(a.value)||0,d:todayD,n:a.note||null};
        applied.balance++;
      }else if(a.type==="add_expense"&&a.desc){
        addedExp.push({desc:String(a.desc).substring(0,60),amount:Math.abs(Number(a.amount)||0),cat:a.cat||"out",date:a.date||""});
        applied.expense++;
      }else if(a.type==="add_income"&&a.name){
        var rec=a.recurring!==false;
        var d=parseInt(a.day);if(isNaN(d)||d<1||d>31)d=1;
        incomes.push({id:uid(),name:String(a.name).substring(0,60),amount:Math.abs(Number(a.amount)||0),source:a.source||"salary",recurring:rec,day:d,date:a.date||"",createdAt:Date.now()});
        applied.income++;
      }else if(a.type==="add_goal"&&a.name){
        goals.push({id:uid(),name:String(a.name).substring(0,60),target:Number(a.target)||0,current:Number(a.current)||0,deadline:a.deadline||"",color:a.color||"#0b1220",createdAt:Date.now()});
        applied.goal++;
      }else if(a.type==="add_recurring"&&a.name){
        var day=parseInt(a.day);if(isNaN(day)||day<1||day>31)day=1;
        recurring.push({id:uid(),name:String(a.name).substring(0,60),amount:Number(a.amount)||0,day:day,cat:a.cat||"sub",createdAt:Date.now()});
        applied.recurring++;
      }else if(a.type==="snapshot"&&a.label){
        dynSnaps.push({l:String(a.label).substring(0,8),liq:Number(a.liq)||0,poup:Number(a.poup)||0,inv:Number(a.inv)||0,div:Number(a.div)||77555.06,xP:Number(a.xP)||0,xT:Number(a.xT)||0,tC:Number(a.tC)||0});
        applied.snapshot++;
      }
    }catch(_e){console.warn("Falha a aplicar accao",a,_e);}
  });
  // History entry
  var totalApplied=applied.balance+applied.expense+applied.income+applied.goal+applied.recurring+applied.snapshot;
  aiHistory.push({
    date:new Date().toLocaleString("pt-PT"),
    cmd:"Documento: "+(aiImport.docType||"importado"),
    actions:actions.filter(function(_,i){return aiImportSel[i];}),
    msg:(aiImport.summary||"")+" ("+totalApplied+" aplicada"+(totalApplied===1?"":"s")+")",
    ok:true
  });
  persistUser();
  aiImport=null;aiImportSel={};
  render();
  var bits=[];
  if(applied.expense)bits.push(applied.expense+" despesa"+(applied.expense===1?"":"s"));
  if(applied.income)bits.push(applied.income+" receita"+(applied.income===1?"":"s"));
  if(applied.balance)bits.push(applied.balance+" saldo"+(applied.balance===1?"":"s"));
  if(applied.goal)bits.push(applied.goal+" meta"+(applied.goal===1?"":"s"));
  if(applied.recurring)bits.push(applied.recurring+" subscri"+(applied.recurring===1?"cao":"coes"));
  if(applied.snapshot)bits.push(applied.snapshot+" snapshot");
  toast(bits.length?bits.join(" + ")+" aplicado"+(totalApplied===1?"":"s"):"Nada aplicado","success");
};

  var el=document.getElementById("lerr");
  if(el)el.innerHTML='<div class="lb" style="margin-bottom:16px">'+e(msg)+'</div>';

window.doLogin=function(){
  if(!fbAuth)return;
  var em=document.getElementById("le").value;
  var pw=document.getElementById("lp").value;
  if(!em||!pw){showAuthErr("Preenche email e password.");return;}
  showAuthInfo("A autenticar...");
  fbAuth.signInWithEmailAndPassword(em,pw).catch(function(err){showAuthErr(err.message||"Falha no login");});
};
window.doRegister=function(){
  if(!fbAuth)return;
  var em=document.getElementById("le").value;
  var pw=document.getElementById("lp").value;
  if(!em||!pw){showAuthErr("Preenche email e password.");return;}
  if(pw.length<6){showAuthErr("Password tem de ter pelo menos 6 caracteres.");return;}
  showAuthInfo("A criar conta...");
  fbAuth.createUserWithEmailAndPassword(em,pw).catch(function(err){showAuthErr(err.message||"Falha no registo");});
};
window.doGoogleLogin=function(){
  if(!fbAuth)return;
  var provider=new firebase.auth.GoogleAuthProvider();
  showAuthInfo("A autenticar com Google...");
  fbAuth.signInWithPopup(provider).catch(function(err){showAuthErr(err.message||"Falha no login Google");});
};
window.doLogout=function(){
  if(!fbAuth)return;
  fbAuth.signOut();
};

function renderContextStrip(C){

function render(){
  try{renderInternal();}
  catch(err){
    console.error("Render falhou",err);
    var el=document.getElementById("app");
    if(el)el.innerHTML='<div style="padding:24px;font-family:monospace;font-size:12px;color:#FF3B30;line-height:1.6"><div style="font-weight:700;font-size:14px;margin-bottom:12px">Erro no render</div><div style="white-space:pre-wrap;word-break:break-word">'+e(String(err&&err.message||err))+'</div><div style="margin-top:12px;font-size:11px;color:#888">Stack:<br>'+e(String(err&&err.stack||"").substring(0,800))+'</div><button onclick="location.reload()" style="margin-top:16px;padding:10px 16px;background:#007AFF;color:#fff;border:none;border-radius:8px;font-family:inherit;cursor:pointer">Recarregar</button></div>';
  }
}

window.toggleTheme=function(){
  var cur=document.documentElement.getAttribute("data-theme");
  var next=cur==="dark"?"light":"dark";
  setTheme(next);
  render();
  toast(next==="dark"?"Modo escuro":"Modo claro","success");
};

/* ══ GLOBAL STATE HANDLER ══ */
window.render=render;
window.T=function(key,val){
  if(val==="null")val=null;
  if(key==="em")val=parseInt(val);
  if(key==="tab"){
    if(tab!==val)haptic("selection");
    var prevTab=tab;tab=val;xCat=null;xExp=null;showMore=false;showAction=false;searchQuery="";
    // page-transition direction hint
    var order=["overview","expenses","goals","cal","income","rec","charts","loan","ai"];
    var pi=order.indexOf(prevTab),ni=order.indexOf(tab);
    pageTransitionDir=(ni>=0&&pi>=0&&ni<pi)?"L":"R";
  }
  else if(key==="xCat"){xCat=val;xExp=null;}
  else if(key==="xExp"){xExp=val;}
  else if(key==="em"){em=val;xExp=null;}
  else if(key==="showSet"){showSet=!!val;}
  else if(key==="showStmt"){showStmt=!!val;if(!val){stResult=null;stSel={};}}
  else if(key==="showAdd"){showAdd=!!val;if(!val)scResult=null;}
  else if(key==="showGoal"){showGoal=!!val;}
  else if(key==="showRec"){showRec=!!val;}
  else if(key==="showInc"){showInc=!!val;}
  else if(key==="showCat"){showCat=!!val;}
  else if(key==="showAction"){showAction=!!val;}
  else if(key==="showMore"){showMore=!!val;}
  else if(key==="showAcct"){showAcct=!!val;}
  else if(key==="showRules"){showRules=!!val;}
  render();
};

/* ══ INIT ══ */
function showFatal(title,msg,extra){
  var el=document.getElementById("app");
  if(!el)return;
  var dark=document.documentElement.getAttribute("data-theme")==="dark";
  el.innerHTML='<div style="min-height:100vh;display:flex;align-items:center;justify-content:center;padding:24px"><div style="max-width:440px;width:100%">'
    +'<div style="width:56px;height:56px;background:var(--signal-soft);border-radius:16px;display:flex;align-items:center;justify-content:center;margin-bottom:18px"><svg width="28" height="28" viewBox="0 0 24 24" fill="none" stroke="var(--signal)" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="10"/><line x1="12" y1="8" x2="12" y2="12"/><line x1="12" y1="16" x2="12.01" y2="16"/></svg></div>'
    +'<div style="font-size:20px;font-weight:700;letter-spacing:-0.02em;margin-bottom:8px">'+e(title)+'</div>'
    +'<div style="font-size:14px;color:var(--text2);line-height:1.6;margin-bottom:16px">'+e(msg)+'</div>'
    +(extra||'')
    +'</div></div>';
}
if(initError){
  if(IS_FILE){
    showFatal(
      "Servir via HTTPS",
      "Estas a abrir o ficheiro localmente (file://). Firebase Auth e Firestore nao funcionam neste modo.",
      '<div class="cd" style="padding:16px;margin-top:12px">'
      +'<div class="lb" style="margin-bottom:10px;color:var(--success)">Solucoes</div>'
      +'<div style="font-size:13px;color:var(--text);line-height:1.7">'
      +'<b>1.</b> Ativa GitHub Pages no repo:<br><span style="font-family:var(--mono);font-size:11px;color:var(--text3)">Settings &rarr; Pages &rarr; Branch: main</span><br>e acede em <span style="font-family:var(--mono);font-size:11px">manuelmarrao0887.github.io/proof-finance</span>'
      +'<br><br><b>2.</b> Ou serve localmente:<br><span style="font-family:var(--mono);font-size:11px;color:var(--text3)">python3 -m http.server 8000</span><br>e abre <span style="font-family:var(--mono);font-size:11px">localhost:8000</span>'
      +'</div></div>'
    );
  }else{
    showFatal("Erro de inicializacao",initError);
  }
}else if(fbAuth){
  try{
    try{fbAuth.setPersistence("local").catch(function(){});}catch(_e){}
    render();
    var authFired=false;
    fbAuth.onAuthStateChanged(function(user){
      authFired=true;
      if(user){
        currentUser=user;
        // Always proceed to app view, regardless of loadUser success/failure
        loadUser().then(function(){view="app";render();},function(){view="app";render();});
        // Hard fallback: if loadUser hangs > 4s, force render anyway
        setTimeout(function(){if(view!=="app"){view="app";render();}},4000);
      }else{
        currentUser=null;
        apiKey="";aiHistory=[];dynAccts=null;dynSnaps=[];addedExp=[];theme="system";goals=[];recurring=[];incomes=[];
        customAccts=[];rules=[];forecastMonths=3;aiInsights=null;
        view="login";render();
      }
    },function(err){
      authFired=true;
      console.error("Firebase Auth error",err);
      showFatal("Erro de autenticacao",(err&&err.message)?err.message:"Firebase Auth indisponivel.");
    });
    // Fallback timer: if auth doesn't respond in 2s, show login
    setTimeout(function(){
      if(!authFired){
        console.warn("Firebase Auth sem resposta em 2s — fallback para login");
        view="login";render();
      }
    },2000);
  }catch(e){
    console.error("Init falhou",e);
    showFatal("Erro de inicializacao",(e&&e.message)?e.message:String(e));
  }
}else{
  showFatal("Firebase nao inicializou","Verifica a consola do browser (F12) para detalhes.");
}

// Global error handler — surface uncaught errors instead of silent failure
window.addEventListener("error",function(ev){
  console.error("Uncaught error",ev.error||ev.message);
  if(view==="loading"){
    showFatal("Erro inesperado",String(ev.error&&ev.error.message||ev.message||"Erro JS"));
  }
});
window.addEventListener("unhandledrejection",function(ev){
  console.error("Unhandled promise rejection",ev.reason);
});
</script>
