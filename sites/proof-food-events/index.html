<style>
:root{
  /* Eclipse design system — Proof Studio brand.
     This app is built dark-only; legacy variable NAMES are preserved and
     REMAPPED to Eclipse tokens so inline JS styles keep working. */

  /* Eclipse tokens (dark base) */
  --bg:#06080c; --surface:#0b0f17; --elevated:#11161f;
  --border:#1c2230; --border-strong:#262e3e;
  --fg:#f5f7fb; --fg-muted:#8b95a8; --fg-subtle:#4a5366;
  --accent:#c8d4ea;
  /* Eclipse state colors (feedback only) */
  --success:#22c55e; --warning:#f59e0b; --danger:#ef4444; --info:#94a3c4;

  /* Legacy names remapped to Eclipse tokens */
  --ink:var(--bg); --ink-2:var(--surface); --ink-3:var(--elevated);
  --paper:var(--fg); --paper-2:var(--border-strong);
  --grey:var(--border); --grey-2:var(--fg-muted); --grey-3:var(--fg-subtle);
  --ink-muted:var(--elevated); --ink-soft:var(--border-strong);
  --signal:var(--accent); --signal-2:#aebcd6;

  /* Radii */
  --r-sm:6px; --r-md:10px; --r-lg:12px; --r-xl:18px; --r-pill:999px;

  --font-display:'Geist',system-ui,sans-serif;
  --font-mono:'Geist Mono',ui-monospace,monospace;
  --font-accent:'Geist',system-ui,sans-serif;
  --ease-out:cubic-bezier(0.2,0,0,1);
  --ease-enter:cubic-bezier(0.16,1,0.3,1);
}
:root[data-theme="dark"]{
  --bg:#06080c; --surface:#0b0f17; --elevated:#11161f;
  --border:#1c2230; --border-strong:#262e3e;
  --fg:#f5f7fb; --fg-muted:#8b95a8; --fg-subtle:#4a5366;
  --accent:#c8d4ea;
}
:root[data-theme="light"]{
  --bg:#fbfcfe; --surface:#f3f6fb; --elevated:#eaeff7;
  --border:#dde4ee; --border-strong:#c4cee0;
  --fg:#0b1220; --fg-muted:#4a5366; --fg-subtle:#8b95a8;
  --accent:#0b1220; --signal-2:#26324a;
}
*{box-sizing:border-box;margin:0;padding:0;border-radius:0}
html{color-scheme:dark;background:var(--bg)}
body{
  background:var(--bg);color:var(--fg);
  font-family:var(--font-display);font-weight:400;line-height:1.6;
  -webkit-font-smoothing:antialiased;letter-spacing:-0.005em;
  min-height:100vh;
}
/* Eclipse: titles weight 500 */
h1,h2,h3,h4,h5,h6{font-weight:500;letter-spacing:-0.02em}
#root{min-height:100vh}

/* Typography utilities */
.mono{font-family:var(--font-mono)}
.caption{font-family:var(--font-mono);font-size:11px;line-height:1.4;letter-spacing:0.12em;text-transform:uppercase;color:var(--grey-2)}
.caption-xs{font-family:var(--font-mono);font-size:9px;line-height:1.4;letter-spacing:0.15em;text-transform:uppercase;color:var(--grey-3)}
.italic-quote{font-family:var(--font-accent);font-style:italic;font-weight:300}

/* Buttons — Eclipse: secondary by default (transparent + 1px border, pill) */
.btn{
  background:transparent;color:var(--fg);border:1px solid var(--border);
  padding:12px 22px;font:500 12px/1 var(--font-mono);
  letter-spacing:0.1em;text-transform:uppercase;
  cursor:pointer;transition:all 140ms var(--ease-out);
  display:inline-flex;align-items:center;gap:8px;
  border-radius:var(--r-pill)!important;
}
.btn:hover{border-color:var(--border-strong);color:var(--fg)}
/* Primary — --fg bg + --bg text, pill */
.btn-primary{background:var(--fg);color:var(--bg);border:1px solid var(--fg)}
.btn-primary:hover{background:var(--border-strong);border-color:var(--border-strong);color:var(--bg)}
/* Accent CTA */
.btn-signal{background:var(--accent);color:var(--bg);border-color:var(--accent);font-weight:500}
.btn-signal:hover{background:var(--signal-2);border-color:var(--signal-2);color:var(--bg)}
.btn:focus-visible{outline:2px solid var(--accent);outline-offset:2px}

/* Inputs — Eclipse: --elevated bg + 1px border + radius 6 */
input,select,textarea{
  background:var(--elevated);border:1px solid var(--border);color:var(--fg);
  padding:11px 14px;font:400 14px var(--font-display);width:100%;
  border-radius:var(--r-sm)!important;
}
input:focus,select:focus,textarea:focus{border-color:var(--border-strong);outline:none}

/* Status dots */
.dot{display:inline-block;width:8px;height:8px;border-radius:50%!important;margin-right:8px;vertical-align:middle}
.dot-signal{background:var(--accent);box-shadow:0 0 0 3px rgba(200,212,234,0.15)}
.dot-success{background:var(--success)}
.dot-grey{background:var(--grey-2)}
.dot-muted{background:var(--grey-3)}

/* Pulse */
@keyframes pulse{0%,100%{opacity:1}50%{opacity:0.4}}
.pulse{animation:pulse 2s ease-in-out infinite}

/* Entrance */
@keyframes fadeUp{from{opacity:0;transform:translateY(12px)}to{opacity:1;transform:translateY(0)}}
.fade-up{animation:fadeUp 400ms var(--ease-enter) both}

/* Card — Eclipse: --surface + 1px border + radius 12, NO shadow */
.card{background:var(--surface);border:1px solid var(--border);border-radius:var(--r-lg)!important}
.card-hoverable{cursor:pointer;transition:all 140ms var(--ease-out)}
.card-hoverable:hover{background:var(--elevated);border-color:var(--border-strong)}

/* Divider */
.divider{border-top:1px solid var(--border)}

/* Wordmark */
.wordmark{font-family:var(--font-display);font-weight:600;letter-spacing:-0.03em}
.wordmark-dot{color:var(--accent)}

/* Table */
table{width:100%;border-collapse:collapse}
th{text-align:left;padding:12px 16px;font:500 10px/1 var(--font-mono);letter-spacing:0.15em;text-transform:uppercase;color:var(--grey-2);border-bottom:1px solid var(--grey)}
td{padding:14px 16px;font:400 14px var(--font-display);color:var(--paper);border-bottom:1px solid var(--grey)}
tr:hover td{background:var(--ink-3)}

/* Progress bar */
.progress-track{height:2px;background:var(--border);width:100%;border-radius:var(--r-pill)!important}
.progress-fill{height:100%;background:var(--accent);border-radius:var(--r-pill)!important}

/* Scrollbars */
::-webkit-scrollbar{width:8px;height:8px}
::-webkit-scrollbar-track{background:var(--ink)}
::-webkit-scrollbar-thumb{background:var(--grey)}
::-webkit-scrollbar-thumb:hover{background:var(--grey-3)}

/* Sidebar */
.nav-item{
  padding:14px 16px;display:flex;align-items:center;gap:12px;
  color:var(--grey-2);font:500 13px var(--font-display);
  letter-spacing:0.02em;cursor:pointer;border-left:3px solid transparent;
  transition:all 120ms var(--ease-out);
}
.nav-item:hover{color:var(--fg);background:var(--surface)}
.nav-item.active{color:var(--fg);border-left-color:var(--accent);background:var(--surface)}

/* Stamp */
@keyframes stampIn{from{opacity:0;transform:rotate(-12deg) scale(1.4)}to{opacity:1;transform:rotate(-12deg) scale(1)}}
.stamp{
  display:inline-flex;align-items:center;justify-content:center;
  border:2px solid var(--accent);color:var(--accent);
  font:500 11px/1 var(--font-mono);letter-spacing:0.15em;
  padding:10px 18px;transform:rotate(-12deg);
  border-radius:var(--r-pill)!important;
  animation:stampIn 400ms var(--ease-enter) both;
}

/* Top bar */
.topbar{border-bottom:1px solid var(--border);background:var(--bg)}

/* Kbd */
kbd{
  font:500 10px var(--font-mono);background:var(--elevated);
  border:1px solid var(--border);padding:2px 6px;color:var(--fg-muted);
  letter-spacing:0.05em;border-radius:var(--r-sm)!important;
}

/* Dashboard metric */
.metric-value{font:500 48px/0.95 var(--font-display);letter-spacing:-0.04em;color:var(--fg)}
.metric-label{font:500 10px var(--font-mono);letter-spacing:0.15em;text-transform:uppercase;color:var(--grey-2);margin-top:8px}

/* Grid lines background */
.grid-bg{
  background-image:
    linear-gradient(var(--border) 1px,transparent 1px),
    linear-gradient(90deg,var(--border) 1px,transparent 1px);
  background-size:48px 48px;background-position:-1px -1px;
  opacity:0.4;
}

/* Signal borderline */
.border-signal-l{border-left:3px solid var(--accent)}

/* Label tag (mono pill) */
.label-tag{
  display:inline-block;padding:3px 10px;
  font:500 10px var(--font-mono);letter-spacing:0.12em;
  text-transform:uppercase;border:1px solid var(--border);color:var(--fg-muted);
  border-radius:var(--r-pill)!important;
}
.label-tag-signal{border-color:var(--accent);color:var(--accent)}
.label-tag-success{border-color:var(--success);color:var(--success)}
.label-tag-paper{border-color:var(--border-strong);color:var(--fg)}

/* Responsive helpers */
.hide-mobile{display:block}
.show-mobile{display:none}
@media(max-width:768px){
  .hide-mobile{display:none}
  .show-mobile{display:block}
  .metric-value{font-size:36px}
}

/* Reduced motion */
@media (prefers-reduced-motion: reduce){
  *,*::before,*::after{animation-duration:0.01ms!important;transition-duration:0.01ms!important}
}
</style>
</head>

const LogisticsView = ({ onBack }) => {
  const nav = [
    { id:'overview', label:'Vista geral', icon:'layout-dashboard' },
    { id:'orders', label:'Ordens de compra', icon:'shopping-cart', badge:5 },
    { id:'suppliers', label:'Fornecedores', icon:'handshake' },
    { id:'stock', label:'Stock & louça', icon:'package' },
    { id:'routes', label:'Rotas de entrega', icon:'map' },
  ];
  const [active, setActive] = useState('overview');

  return (
    <Shell role="logistics" onBack={onBack} navItems={nav} active={active} setActive={setActive} caseCode="HUB 01">
      {active === 'overview' && <LogisticsOverview />}
      {active === 'orders' && <LogisticsOrders />}
      {active === 'suppliers' && <LogisticsSuppliers />}
      {active === 'stock' && <LogisticsStock />}
      {active === 'routes' && <LogisticsRoutes />}
      <Footer caseCode="HUB 01" />
    </Shell>
  );
};

const LogisticsOverview = () => {
  const totalOrders = PURCHASE_ORDERS.length;

  const inTransit = PURCHASE_ORDERS.filter(o => o.status === 'in-transit').length;
  const totalValue = PURCHASE_ORDERS.reduce((s,o) => s + o.amount, 0);

  return (
    <div>
      <div style={{marginBottom:32}}>
        <div className="caption" style={{marginBottom:12}}>HUB DE LOGÍSTICA · LISBOA</div>
        <h1 style={{fontFamily:'var(--font-display)', fontWeight:900, fontSize:'clamp(32px,5vw,48px)', lineHeight:0.95, letterSpacing:'-0.035em', textTransform:'uppercase'}}>
          Operações<span style={{color:'var(--signal)'}}>.</span>

      </div>

        <Metric value={totalOrders} label="POs activas" />
        <Metric value={pending} label="Pendentes" />
        <Metric value={inTransit} label="Em trânsito" />
        <Metric value={`€${totalValue.toLocaleString('pt-PT')}`} label="Valor consolidado" />
      </div>

      {/* Urgent POs */}
      <div className="card" style={{marginBottom:24}}>
        <div style={{padding:'20px 24px', borderBottom:'1px solid var(--grey)', display:'flex', justifyContent:'space-between', alignItems:'center'}}>
          <div className="caption" style={{color:'var(--signal)'}}>● URGENTE — A ACTUAR NAS PRÓXIMAS 48H</div>
        </div>
        <div style={{overflowX:'auto'}}>
          <table>
            <thead>
              <tr>
                <th>PO</th><th>Evento</th><th>Fornecedor</th><th className="hide-mobile">Items</th><th>Valor</th><th>ETA</th><th>Status</th>
              </tr>
            </thead>
            <tbody>
              {PURCHASE_ORDERS.filter(o => o.status === 'pending').map(o => (

                  <td className="mono" style={{fontSize:12}}>{o.event}</td>
                  <td>{o.supplier}</td>
                  <td className="hide-mobile" style={{fontSize:12, color:'var(--grey-2)'}}>{o.items}</td>

      <div style={{border:'1px solid var(--grey)', background:'var(--ink-2)'}}>

          return (
            <div key={i} style={{padding:'20px 24px', borderBottom: i < stock.length-1 ? '1px solid var(--grey)' : 'none'}}>

  );
};

/* ============================================================
   ROOT
   ============================================================ */
const App = () => {
  const [role, setRole] = useState(null);

  useEffect(() => {
    if (window.lucide) window.lucide.createIcons({ attrs: { 'stroke-width': 1.5 } });
  }, [role]);

  if (!role) return <Landing onSelect={setRole} />;
  if (role === 'admin') return <AdminView onBack={() => setRole(null)} />;
  if (role === 'manager') return <ManagerView onBack={() => setRole(null)} />;
  if (role === 'client') return <ClientView onBack={() => setRole(null)} />;
  if (role === 'logistics') return <LogisticsView onBack={() => setRole(null)} />;
};

const root = ReactDOM.createRoot(document.getElementById('root'));
root.render(<App />);
</script>
